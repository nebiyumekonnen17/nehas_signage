<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nehas Player | Ultra-Blur Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #020617; overflow: hidden; font-family: sans-serif; }
        
        #bg { 
            position: fixed; 
            width: 100%; 
            height: 100%; 
            background: url('https://res.cloudinary.com/dfgfiope9/image/upload/nehas-bg_qj3n5q.jpg') center/cover; 
            filter: brightness(0.55); 
            z-index: 1; 
            opacity: 0; 
            transition: opacity 2s ease-in-out; 
        }
        
        #media-container { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            z-index: 5; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .glass-card { 
            /* Background remains transparent (0.4) to let light through */
            background: rgba(15, 23, 42, 0.4); 
            /* Ultra-Blur set to 60px */
            backdrop-filter: blur(60px); 
            -webkit-backdrop-filter: blur(60px);
            padding: 60px; 
            border-radius: 40px; 
            border: 1px solid rgba(59, 130, 246, 0.3); 
            text-align: center; 
            color: white; 
            box-shadow: 0 30px 100px rgba(0, 0, 0, 0.6);
            opacity: 0; 
            transform: translateY(30px);
            transition: opacity 1.5s ease-out, transform 1.5s ease-out;
        }

        .glass-card.reveal {
            opacity: 1;
            transform: translateY(0);
        }

        .brand-am { font-size: 1.5rem; color: #94a3b8; margin: 10px 0; letter-spacing: 2px; font-weight: 300; }
        .code { font-size: 8rem; font-weight: 900; margin: 15px 0; font-family: monospace; color: #fff; text-shadow: 0 0 50px rgba(59, 130, 246, 0.6); letter-spacing: 5px; }
        #log { position: fixed; bottom: 15px; left: 20px; font-size: 11px; color: #3b82f6; font-family: monospace; opacity: 0.6; }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div id="media-container">
        <div class="glass-card" id="ui-box">
            <h2 id="ui-header" style="letter-spacing:8px; color:#3b82f6; margin-bottom: 5px; font-weight: 900;">NEHAS SIGNAGE</h2>
            <div class="brand-am">ነሃስ ማስታወቂያ</div>
            <div id="ui-content">System Initializing...</div>
        </div>
    </div>
    <div id="log">OS_STATUS: <span id="status-text">BOOTING</span></div>

    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFተIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const sbClient = supabase.createClient(S_URL, S_KEY);

        let SCREEN_ID = localStorage.getItem('nehas_sid');
        let SAVED_CODE = localStorage.getItem('nehas_code');

        async function boot() {
            const bg = document.getElementById('bg');
            const ui = document.getElementById('ui-box');

            setTimeout(() => { bg.style.opacity = "1"; }, 300);
            setTimeout(() => { ui.classList.add('reveal'); }, 1500);
            
            if (SCREEN_ID && SAVED_CODE) {
                try {
                    const { data } = await sbClient.from('screens').select('*').eq('id', SCREEN_ID).maybeSingle();
                    if (data) {
                        if (data.is_paired) return startLoop();
                        return showPairingUI(data.pairing_code);
                    }
                } catch (e) {
                    return showPairingUI(SAVED_CODE);
                }
            }
            registerNewDevice();
        }

        async function registerNewDevice() {
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            showPairingUI(code);
            try {
                const { data } = await sbClient.from('screens').insert([
                    { name: 'Display-Unit', pairing_code: code, is_paired: false }
                ]).select();
                if (data && data[0]) {
                    localStorage.setItem('nehas_sid', data[0].id);
                    localStorage.setItem('nehas_code', code);
                    SCREEN_ID = data[0].id;
                    watchPairing();
                }
            } catch (err) {
                setTimeout(registerNewDevice, 5000);
            }
        }

        function showPairingUI(code) {
            document.getElementById('ui-content').innerHTML = `
                <div class="code">${code}</div>
                <p style="opacity: 0.8; font-size: 1.1rem;">Link this TV in your dashboard to begin.</p>
            `;
        }

        function watchPairing() {
            sbClient.channel('p').on('postgres_changes', { 
                event: 'UPDATE', schema: 'public', table: 'screens', filter: `id=eq.${SCREEN_ID}` 
            }, () => location.reload()).subscribe();
        }

        async function startLoop() {
            const { data } = await sbClient.from('playlist_items').select('media!inner(*)').eq('screen_id', SCREEN_ID);
            if (data?.length > 0) {
                document.getElementById('bg').style.opacity = "0";
                document.getElementById('ui-box').style.display = "none";
                const m = data[0].media;
                const cont = document.getElementById('media-container');
                if(m.media_type==='video') cont.innerHTML = `<video src="${m.file_url}" autoplay muted onended="location.reload()" style="width:100%;height:100%;object-fit:cover;"></video>`;
                else if(m.media_type==='url') cont.innerHTML = `<iframe src="${m.file_url}" style="width:100%;height:100%;border:none;"></iframe>`;
                else cont.innerHTML = `<img src="${m.file_url}" style="max-width:100%;max-height:100%;object-fit:contain;">`;
            } else {
                document.getElementById('ui-content').innerHTML = `<p style="font-size: 1.2rem;">Linked & Ready.</p>`;
            }
        }

        window.onload = boot;
    </script>
</body>
</html>
