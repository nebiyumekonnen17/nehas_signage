<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nehas Player | TV Display</title>
    
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* Transparent body allows the #bg div to show through */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: transparent; 
            overflow: hidden; font-family: 'Inter', sans-serif; cursor: none; 
        }
        
        /* The Actual Background Layer */
        #bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: url('https://res.cloudinary.com/dfgfiope9/image/upload/nehas-bg_qj3n5q.jpg') center/cover no-repeat; 
            filter: brightness(0.4); 
            z-index: -1; /* Sits behind everything */
            transition: opacity 1.5s ease;
        }
        
        /* Media layer sits above background but below the UI card */
        #media-container { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 5; display: flex; align-items: center; justify-content: center; 
            background: transparent; /* Changed from black to transparent */
        }
        
        #media-container img, #media-container video {
            max-width: 100%; max-height: 100%; object-fit: contain;
        }

        /* The Transparent "Glass" UI Card */
        .glass-card { 
            background: rgba(15, 23, 42, 0.4); /* Transparent dark blue */
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            padding: 50px 70px; border-radius: 40px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            text-align: center; color: white; 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            transition: opacity 0.8s ease;
        }

        .brand-eng { font-size: 2.2rem; letter-spacing: 8px; color: #3b82f6; font-weight: 900; margin-bottom: 5px; }
        .brand-am { font-size: 1.8rem; color: #cbd5e1; margin-bottom: 25px; }
        .code { font-size: 7rem; font-weight: 900; color: #fff; text-shadow: 0 0 40px rgba(59, 130, 246, 0.6); }
        
        #status { position: fixed; bottom: 15px; left: 20px; font-size: 11px; color: #3b82f6; font-family: monospace; opacity: 0.6; z-index: 999; }
        .fs-prompt { font-size: 11px; color: #64748b; margin-top: 20px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="bg"></div>
    
    <div id="media-container"></div>
    
    <div class="glass-card" id="ui-box">
        <div class="brand-eng">NEHAS SIGNAGE</div>
        <div class="brand-am">ነሃስ ማስታወቂያ</div>
        <div id="ui-content" style="color:#94a3b8; font-size: 1.2rem;">Booting...</div>
        <div class="fs-prompt" id="fs-hint">Click for Fullscreen</div>
    </div>
    
    <div id="status">OS_STATUS: <span id="log-text">IDLE</span></div>

    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const sbClient = supabase.createClient(S_URL, S_KEY);
        
        let SCREEN_ID = localStorage.getItem('nehas_sid');
        let currentPlaylist = [];
        let currentIndex = -1; 
        let lastSignature = ""; 
        let playbackTimer = null;

        function updateLog(msg) { document.getElementById('log-text').innerText = msg; }

        async function boot() {
            updateLog("CHECKING_ID");
            if (SCREEN_ID) {
                const { data } = await sbClient.from('screens').select('*').eq('id', SCREEN_ID).maybeSingle();
                if (data && data.is_paired) {
                    startEngine();
                    return;
                }
            }
            register();
        }

        async function register() {
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            const { data } = await sbClient.from('screens').insert([{ name: 'New Display', pairing_code: code, is_paired: false }]).select();
            if (data && data[0]) {
                SCREEN_ID = data[0].id;
                localStorage.setItem('nehas_sid', SCREEN_ID);
                document.getElementById('ui-content').innerHTML = `<div class="code">${code}</div><p>Pair this code in Dashboard.</p>`;
                setInterval(async () => {
                    const { data: s } = await sbClient.from('screens').select('is_paired').eq('id', SCREEN_ID).maybeSingle();
                    if (s && s.is_paired) location.reload();
                }, 5000);
            }
        }

        function startEngine() {
            updateLog("ENGINE_LIVE");
            fetchPlaylist(); 
            setInterval(fetchPlaylist, 10000); 
            setInterval(() => {
                sbClient.from('screens').update({ last_seen: new Date().toISOString() }).eq('id', SCREEN_ID);
            }, 15000);
        }

        async function fetchPlaylist() {
            const { data } = await sbClient.from('playlist_items').select('id, duration, media(*)').eq('screen_id', SCREEN_ID).order('display_order', { ascending: true });
            const sig = data ? data.map(p => p.id).join(',') : "";
            if (sig !== lastSignature) {
                currentPlaylist = data || [];
                lastSignature = sig;
                currentIndex = -1;
                playNext(); 
            }
        }

        function playNext() {
            clearTimeout(playbackTimer);
            if (currentPlaylist.length === 0) {
                document.getElementById('ui-box').style.opacity = "1";
                document.getElementById('bg').style.opacity = "1";
                document.getElementById('ui-content').innerText = "Waiting for media...";
                document.getElementById('media-container').innerHTML = '';
                return;
            }
            currentIndex = (currentIndex + 1) >= currentPlaylist.length ? 0 : currentIndex + 1;
            renderMedia(currentPlaylist[currentIndex]);
        }

        function renderMedia(item) {
            updateLog(`PLAYING: ${item.media.media_type.toUpperCase()}`);
            
            // Fade out the UI and Background when media starts
            document.getElementById('bg').style.opacity = "0";
            document.getElementById('ui-box').style.opacity = "0";
            
            const cont = document.getElementById('media-container');
            const media = item.media;

            if (media.media_type === 'image') {
                cont.innerHTML = `<img src="${media.file_url}">`;
                playbackTimer = setTimeout(playNext, (item.duration || 10) * 1000);
            } else if (media.media_type === 'video') {
                cont.innerHTML = `<video id="v" src="${media.file_url}" autoplay muted></video>`;
                document.getElementById('v').onended = playNext;
            } else if (media.media_type === 'url') {
                cont.innerHTML = `<iframe id="yt" src="${media.file_url}&enablejsapi=1&autoplay=1&mute=1" style="width:100%;height:100%;border:none"></iframe>`;
                setTimeout(() => {
                    try {
                        new YT.Player('yt', { events: { 'onStateChange': (e) => { if(e.data === 0) playNext(); } } });
                    } catch(e) { setTimeout(playNext, 60000); }
                }, 1000);
            }
        }

        document.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                document.getElementById('fs-hint').style.display = "none";
            }
        });

        window.onload = boot;
    </script>
</body>
</html>
