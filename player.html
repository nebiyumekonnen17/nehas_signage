<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nehas Signage Player | ነሃስ ማስታወቂያ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; 
        }

        /* Full-Screen Interactive Background Canvas */
        #interactive-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            /* The image provided is now used as a background layer behind particles */
            background: url('https://output.googleusercontent.com/image_generation_content/0/generated_image.webp') no-repeat center center;
            background-size: cover;
            transition: opacity 1s ease-in-out;
        }

        /* Content Layer (Images/Video/Apps) */
        #media-container {
            position: relative; width: 100%; height: 100%; z-index: 2;
            display: flex; align-items: center; justify-content: center;
        }

        img, video, iframe { width: 100%; height: 100%; border: none; object-fit: contain; position: absolute; }

        /* Modern, Interactive Glassmorphism Overlay Card */
        .overlay-card {
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 70px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
            color: white;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            animation: cardEntrance 0.8s ease-out;
        }

        .label { font-size: 1.3rem; text-transform: uppercase; letter-spacing: 3px; color: #3b82f6; font-weight: 700; margin-bottom: 15px; }
        .pairing-code { font-size: 6rem; font-weight: 800; margin: 15px 0; font-family: monospace; letter-spacing: 5px; color: #fff; text-shadow: 0 0 20px rgba(59, 130, 246, 0.7); }
        .sub-text { font-size: 1.1rem; color: #a1a1aa; max-width: 400px; margin: 0 auto; }

        /* Status Ticker (for diagnostics, keep subtle) */
        #diag-bar { position: fixed; bottom: 8px; left: 10px; font-size: 9px; color: rgba(255,255,255,0.3); z-index: 100; font-family: monospace; text-transform: uppercase;}

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>

    <canvas id="interactive-bg"></canvas>
    
    <div id="media-container"></div>
    
    <div id="diag-bar">STATUS: <span id="log-status">INIT</span> | ID: <span id="log-id">...</span></div>

    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFተIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const sbClient = supabase.createClient(S_URL, S_KEY);

        let SCREEN_ID = localStorage.getItem('nehas_sid');
        let playlist = [];
        let currentIndex = 0;
        let loopTimer;

        // Particle System Setup
        const canvas = document.getElementById('interactive-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const particleCount = 60;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.color = Math.random() > 0.5 ? 'rgba(59, 130, 246, 0.5)' : 'rgba(139, 92, 246, 0.5)'; // Blue/Purple mix
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
                if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                // Draw connecting lines
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 150) {
                        ctx.strokeStyle = `rgba(255, 255, 255, ${0.1 - distance/1500})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateParticles);
        }

        // --- System Logic ---

        async function boot() {
            initParticles();
            animateParticles();

            if (!SCREEN_ID) {
                const code = Math.floor(100000 + Math.random() * 900000).toString();
                // Create screen record with placeholder name to prevent constraint errors
                const { data } = await sbClient.from('screens').insert([
                    { name: 'New Attraction Display', pairing_code: code, is_paired: false }
                ]).select();

                if (data) {
                    SCREEN_ID = data[0].id;
                    localStorage.setItem('nehas_sid', SCREEN_ID);
                    showPairingScreen(code);
                    
                    sbClient.channel('pairing-watch')
                        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'screens', filter: `id=eq.${SCREEN_ID}` }, (payload) => {
                            if (payload.new.is_paired) location.reload();
                        }).subscribe();
                }
            } else {
                document.getElementById('log-id').innerText = SCREEN_ID.substring(0, 8);
                startPlayer();
            }
        }

        function showPairingScreen(code) {
            document.getElementById('log-status').innerText = "AWAITING PAIRING";
            document.getElementById('media-container').innerHTML = `
                <div class="overlay-card">
                    <div class="label">Activate Display</div>
                    <div class="pairing-code">${code}</div>
                    <div class="sub-text">Visit your Nehas Admin Dashboard and enter this code to begin casting.</div>
                </div>
            `;
        }

        async function startPlayer() {
            await syncPlaylist();
            sbClient.channel('content-sync')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'playlist_items' }, syncPlaylist)
                .subscribe();
            // Fallback hard sync every 30s
            setInterval(syncPlaylist, 30000);
            playNext();
        }

        async function syncPlaylist() {
            const { data } = await sbClient.from('playlist_items')
                .select('duration_seconds, media!inner(*)')
                .eq('screen_id', SCREEN_ID);
            
            playlist = data || [];
            document.getElementById('log-count').innerText = playlist.length;
        }

        async function playNext() {
            clearTimeout(loopTimer);
            const container = document.getElementById('media-container');
            const bgCanvas = document.getElementById('interactive-bg');

            // Update heartbeat
            await sbClient.from('screens').update({ last_seen: new Date().toISOString() }).eq('id', SCREEN_ID);

            if (playlist.length === 0) {
                // Interactive Ready State when linked but empty
                document.getElementById('log-status').innerText = "IDLE (READY)";
                container.innerHTML = `
                    <div class="overlay-card">
                        <div class="label">Ready to Cast</div>
                        <div style="font-size: 2rem; margin-top:15px; font-weight:600;">ነሃስ ማስታወቂያ</div>
                        <div class="sub-text" style="margin-top:10px;">Awaiting media assignment...</div>
                    </div>
                `;
                bgCanvas.style.opacity = "1";
                setTimeout(playNext, 10000);
                return;
            }

            document.getElementById('log-status').innerText = "PLAYING";
            const item = playlist[currentIndex];
            currentIndex = (currentIndex + 1) % playlist.length;

            // Hide background and clear overlay when media is playing
            bgCanvas.style.opacity = "0";
            container.innerHTML = ""; 

            if (item.media.media_type === 'image' || item.media.media_type === 'image/*') {
                container.innerHTML = `<img src="${item.media.file_url}" alt="Signage Content">`;
                loopTimer = setTimeout(playNext, (item.duration_seconds || 10) * 1000);
            } else if (item.media.media_type === 'video') {
                container.innerHTML = `<video src="${item.media.file_url}" autoplay muted style="background:black;"></video>`;
                container.querySelector('video').onended = playNext;
            } else {
                container.innerHTML = `<iframe src="${item.media.file_url}" allow="autoplay; encrypted-media; fullscreen" background="white"></iframe>`;
                loopTimer = setTimeout(playNext, (item.duration_seconds || 60) * 1000);
            }
        }

        boot();
    </script>
</body>
</html>
