<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nehas Player | Digital Signage</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #020617; overflow: hidden; font-family: 'Inter', sans-serif; }
        
        /* High-End Background */
        #bg { position: fixed; width: 100%; height: 100%; background: url('https://res.cloudinary.com/dfgfiope9/image/upload/nehas-bg_qj3n5q.jpg') center/cover; filter: brightness(0.4); z-index: 1; transition: opacity 1.5s; }
        
        #media-container { position: relative; width: 100%; height: 100%; z-index: 5; display: flex; align-items: center; justify-content: center; }
        
        /* Neon Glassmorphism Card */
        .glass-card { 
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(30px); 
            padding: 60px 80px; 
            border-radius: 40px; 
            border: 1px solid rgba(59, 130, 246, 0.2); 
            text-align: center; 
            color: white; 
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.2), 0 30px 100px rgba(0, 0, 0, 0.8); 
            animation: float 6s ease-in-out infinite; 
        }

        .brand-eng { font-size: 1.8rem; letter-spacing: 8px; color: #3b82f6; font-weight: 900; margin-bottom: 5px; text-transform: uppercase; }
        .brand-am { font-size: 1.4rem; color: #94a3b8; margin-bottom: 30px; letter-spacing: 2px; }
        
        .code { 
            font-size: 8rem; 
            font-weight: 900; 
            margin: 20px 0; 
            font-family: 'Monaco', monospace; 
            color: #fff; 
            text-shadow: 0 0 40px #3b82f6; 
            letter-spacing: 10px; 
        }

        .instruction { font-size: 1.1rem; color: #64748b; max-width: 450px; line-height: 1.6; }

        @keyframes float { 
            0%, 100% { transform: translateY(0px); } 
            50% { transform: translateY(-20px); } 
        }

        #status-ticker { position: fixed; bottom: 15px; left: 20px; font-size: 10px; color: #3b82f6; z-index: 100; font-family: monospace; letter-spacing: 2px; opacity: 0.5; }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div id="media-container">
        <div class="glass-card" id="ui-box">
            <h2 style="color:#3b82f6; letter-spacing:5px;">SYSTEM_BOOT</h2>
            <p>Verifying Identity...</p>
        </div>
    </div>
    <div id="status-ticker">NEHAS_OS // <span id="log-text">INITIALIZING</span></div>

    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFŠČįIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const sbClient = supabase.createClient(S_URL, S_KEY);
        
        let SCREEN_ID = localStorage.getItem('nehas_sid');

        function updateLog(msg) {
            const el = document.getElementById('log-text');
            if (el) el.innerText = msg;
        }

        async function boot() {
            updateLog("CHECKING_LOCAL_STORAGE");
            
            if (SCREEN_ID) {
                // Verify ID still exists in Database
                const { data } = await sbClient.from('screens').select('*').eq('id', SCREEN_ID).maybeSingle();
                if (data) {
                    if (data.is_paired) startLoop();
                    else showPairingUI(data.pairing_code);
                    return;
                }
            }
            startNewPairing();
        }

        async function startNewPairing() {
            updateLog("GENERATING_NEW_IDENTITY");
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            
            // Show UI immediately
            showPairingUI(code);

            // Register with DB using English to avoid ISO-8859-1 header errors
            const { data, error } = await sbClient.from('screens').insert([
                { name: 'Display-Unit', pairing_code: code, is_paired: false }
            ]).select();

            if (data && data[0]) {
                SCREEN_ID = data[0].id;
                localStorage.setItem('nehas_sid', SCREEN_ID);
                updateLog("IDENTITY_LOCKED");
                watchPairing();
            } else {
                updateLog("DB_SYNC_ERROR_RETRYING");
                setTimeout(startNewPairing, 5000);
            }
        }

        function showPairingUI(code) {
            document.getElementById('ui-box').innerHTML = `
                <div class="brand-eng">NEHAS SIGNAGE</div>
                <div class="brand-am">ŠäźŠąÉŠąĶ ŠąõŠąĶŠČ≥ŠčąŠČāŠčę</div>
                <div class="code">${code}</div>
                <div class="instruction">Enter this activation code on your management dashboard to link this display.</div>
            `;
        }

        function watchPairing() {
            sbClient.channel('pairing').on('postgres_changes', { 
                event: 'UPDATE', schema: 'public', table: 'screens', filter: `id=eq.${SCREEN_ID}` 
            }, () => location.reload()).subscribe();
        }

        async function startLoop() {
            updateLog("PLAYER_LIVE");
            const { data } = await sbClient.from('playlist_items').select('media!inner(*)').eq('screen_id', SCREEN_ID);
            
            if (data?.length > 0) {
                document.getElementById('bg').style.opacity = "0";
                const m = data[0].media;
                const cont = document.getElementById('media-container');
                
                if(m.media_type === 'video') {
                    cont.innerHTML = `<video src="${m.file_url}" autoplay muted onended="location.reload()" style="width:100%;height:100%;object-fit:cover;"></video>`;
                } else if(m.media_type === 'url') {
                    cont.innerHTML = `<iframe src="${m.file_url}" style="width:100%;height:100%;border:none;"></iframe>`;
                } else {
                    cont.innerHTML = `<img src="${m.file_url}" style="max-width:100%;max-height:100%;object-fit:contain;">`;
                }
            } else {
                document.getElementById('ui-box').innerHTML = `
                    <div class="brand-eng">NEHAS SIGNAGE</div>
                    <div class="brand-am">ŠäźŠąÉŠąĶ ŠąõŠąĶŠČ≥ŠčąŠČāŠčę</div>
                    <p style="color:#3b82f6;">Linked & Standby</p>
                    <p class="instruction">Add content from your dashboard to begin broadcasting.</p>
                `;
            }
        }

        window.onload = boot;
    </script>
</body>
</html>
