<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nehas Player | ነሃስ ማስታወቂያ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: black; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #media-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        img, video, iframe { width: 100%; height: 100%; border: none; object-fit: contain; }
        .pair-display { color: white; text-align: center; }
        .code-text { font-size: 100px; font-weight: bold; color: #3b82f6; margin: 20px 0; font-family: monospace; }
        #debug-log { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); color: #00ff00; font-size: 10px; padding: 5px; z-index: 100; font-family: monospace; }
    </style>
</head>
<body>
    <div id="media-container"></div>
    <div id="debug-log">Initializing...</div>

    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const sbClient = supabase.createClient(S_URL, S_KEY);

        let SCREEN_ID = localStorage.getItem('nehas_sid');
        let playlist = [];
        let currentIndex = 0;
        let loopTimer;

        const log = (msg) => document.getElementById('debug-log').innerText = msg;

        async function boot() {
            log("Checking local ID...");
            if (!SCREEN_ID) {
                await startPairing();
            } else {
                const { data, error } = await sbClient.from('screens').select('*').eq('id', SCREEN_ID).single();
                if (error || !data || !data.is_paired) {
                    log("ID invalid or unpaired. Starting fresh...");
                    await startPairing();
                } else {
                    log("Paired! Starting playback...");
                    runSystem();
                }
            }
        }

        async function startPairing() {
            log("Generating pairing code...");
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            
            const { data, error } = await sbClient.from('screens').insert([{ pairing_code: code, is_paired: false }]).select();
            
            if (error) {
                log("DB ERROR: " + error.message);
                return;
            }

            SCREEN_ID = data[0].id;
            localStorage.setItem('nehas_sid', SCREEN_ID);
            
            document.getElementById('media-container').innerHTML = `
                <div class="pair-display">
                    <div style="font-size:24px;">NEHAS SIGNAGE</div>
                    <div class="code-text">${code}</div>
                    <div style="font-size:18px;">Enter this code on your dashboard</div>
                </div>`;
            
            // Wait for admin to pair
            sbClient.channel('pair-watch').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'screens', filter: `id=eq.${SCREEN_ID}` }, payload => {
                if (payload.new.is_paired) location.reload();
            }).subscribe();
        }

        async function runSystem() {
            await sync();
            // Watch for playlist changes
            sbClient.channel('playlist-watch').on('postgres_changes', { event: '*', schema: 'public', table: 'playlist_items' }, sync).subscribe();
            play();
        }

        async function sync() {
            log("Syncing items...");
            const { data, error } = await sbClient
                .from('playlist_items')
                .select('duration_seconds, media!inner(*)') 
                .eq('screen_id', SCREEN_ID)
                .order('display_order', { ascending: true });

            if (!error) {
                playlist = data || [];
                log(`Active items: ${playlist.length}`);
            } else {
                log("Sync Error: " + error.message);
            }
        }

        async function play() {
            clearTimeout(loopTimer);
            const cont = document.getElementById('media-container');
            
            // Heartbeat
            await sbClient.from('screens').update({ last_seen: new Date().toISOString() }).eq('id', SCREEN_ID);

            if (playlist.length === 0) {
                cont.innerHTML = `<div style="color:white; text-align:center;"><h2>ነሃስ ማስታወቂያ</h2><p>Waiting for content...</p></div>`;
                loopTimer = setTimeout(play, 5000);
                return;
            }

            const item = playlist[currentIndex];
            currentIndex = (currentIndex + 1) % playlist.length;

            if (item.media.media_type === 'image') {
                cont.innerHTML = `<img src="${item.media.file_url}">`;
                loopTimer = setTimeout(play, (item.duration_seconds || 10) * 1000);
            } else if (item.media.media_type === 'video') {
                cont.innerHTML = `<video src="${item.media.file_url}" autoplay muted style="background:black;"></video>`;
                const v = cont.querySelector('video');
                v.onended = play;
                v.onerror = play;
            } else {
                cont.innerHTML = `<iframe src="${item.media.file_url}" allow="autoplay"></iframe>`;
                loopTimer = setTimeout(play, (item.duration_seconds || 60) * 1000);
            }
        }

        boot();
    </script>
</body>
</html>
