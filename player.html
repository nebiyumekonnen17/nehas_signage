<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nehas Signage TV | ነሃስ ማስታወቂያ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: black; overflow: hidden; }
        #media-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        img, video { max-width: 100%; max-height: 100%; object-fit: contain; }
        .pair-code { color: white; font-size: 80px; font-family: monospace; text-align: center; }
        .brand { position: absolute; bottom: 20px; right: 20px; color: rgba(255,255,255,0.3); font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="media-container"></div>
    <div class="brand">ነሃስ ማስታወቂያ</div>

    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const sbClient = window.supabase.createClient(S_URL, S_KEY);

        let SCREEN_ID = localStorage.getItem('nehas_sid');
        let playlist = [];
        let currentIndex = 0;
        let loopTimer;

        async function boot() {
            if (!SCREEN_ID) {
                showPairing();
            } else {
                const { data } = await sbClient.from('screens').select('*').eq('id', SCREEN_ID).single();
                if (!data || !data.is_paired) showPairing();
                else start();
            }
        }

        async function showPairing() {
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            const { data } = await sbClient.from('screens').insert([{ pairing_code: code, is_paired: false }]).select();
            SCREEN_ID = data[0].id;
            localStorage.setItem('nehas_sid', SCREEN_ID);
            
            document.getElementById('media-container').innerHTML = `
                <div class="pair-code">
                    <p style="font-size:24px;">Enter this code on Dashboard:</p>
                    ${code}
                </div>`;
            
            // Wait for pairing
            sbClient.channel('pairing').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'screens', filter: `id=eq.${SCREEN_ID}` }, payload => {
                if (payload.new.is_paired) location.reload();
            }).subscribe();
        }

        async function start() {
            // 1. Sync Playlist
            syncPlaylist();
            // 2. Real-time updates
            sbClient.channel('pl').on('postgres_changes', { event: '*', schema: 'public', table: 'playlist_items', filter: `screen_id=eq.${SCREEN_ID}` }, syncPlaylist).subscribe();
            // 3. Play
            play();
        }

        async function syncPlaylist() {
            const { data } = await sbClient.from('playlist_items').select(`duration_seconds, media ( file_url, media_type )`).eq('screen_id', SCREEN_ID).order('display_order');
            playlist = data || [];
        }

        async function play() {
            clearTimeout(loopTimer);
            const container = document.getElementById('media-container');
            
            // HEARTBEAT: TV tells DB it's alive and working!
            await sbClient.from('screens').update({ last_seen: new Date().toISOString() }).eq('id', SCREEN_ID);

            if (playlist.length === 0) {
                container.innerHTML = `<div style="color:white; font-size:30px;">ነሃስ ማስታወቂያ<br>Waiting for media...</div>`;
                setTimeout(play, 5000); // Check again in 5s
                return;
            }

            const item = playlist[currentIndex];
            currentIndex = (currentIndex + 1) % playlist.length;

            if (item.media.media_type === 'image') {
                container.innerHTML = `<img src="${item.media.file_url}">`;
                loopTimer = setTimeout(play, item.duration_seconds * 1000);
            } else {
                container.innerHTML = `<video src="${item.media.file_url}" autoplay muted></video>`;
                const v = container.querySelector('video');
                v.onended = play;
                v.onerror = play;
            }
        }

        boot();
    </script>
</body>
</html>
