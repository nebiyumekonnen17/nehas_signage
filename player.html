<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nehas Player | ነሃስ ማስታወቂያ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: black; overflow: hidden; font-family: sans-serif; }
        #media-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        img, video, iframe { width: 100%; height: 100%; border: none; object-fit: contain; position: absolute; }
        .pair-display { color: white; text-align: center; z-index: 10; font-family: 'Segoe UI', sans-serif; }
        .code-text { font-size: 110px; font-weight: bold; color: #3b82f6; margin: 30px 0; font-family: monospace; letter-spacing: 10px; }
        #debug-bar { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(0,0,0,0.8); color: #00ff00; 
            font-size: 11px; padding: 5px 15px; z-index: 100; 
            font-family: monospace; display: flex; gap: 20px;
        }
    </style>
</head>
<body>
    <div id="media-container"></div>
    <div id="debug-bar">
        <span>STATUS: <span id="log-status">INITIALIZING</span></span>
        <span>ID: <span id="log-id">...</span></span>
        <span>ITEMS: <span id="log-count">0</span></span>
    </div>

    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const sbClient = supabase.createClient(S_URL, S_KEY);

        let SCREEN_ID = localStorage.getItem('nehas_sid');
        let playlist = [];
        let currentIndex = 0;
        let loopTimer;

        const logStatus = (msg) => document.getElementById('log-status').innerText = msg;
        const logId = (id) => document.getElementById('log-id').innerText = id;
        const logCount = (count) => document.getElementById('log-count').innerText = count;

        async function boot() {
            if (!SCREEN_ID) {
                await startPairing();
            } else {
                logId(SCREEN_ID.substring(0, 8));
                const { data, error } = await sbClient.from('screens').select('*').eq('id', SCREEN_ID).single();
                if (error || !data || !data.is_paired) {
                    await startPairing();
                } else {
                    logStatus("PAIRED: FETCHING...");
                    runSystem();
                }
            }
        }

        async function startPairing() {
            logStatus("AWAITING PAIRING");
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            
            // CRITICAL FIX: Providing a default name to avoid DB Not-Null constraint violation
            const { data, error } = await sbClient.from('screens').insert([{ 
                name: "New Display Unit", 
                pairing_code: code, 
                is_paired: false 
            }]).select();
            
            if (error || !data || data.length === 0) { 
                logStatus("DB ERROR: " + (error?.message || "Insert failed")); 
                return; 
            }
            
            SCREEN_ID = data[0].id;
            localStorage.setItem('nehas_sid', SCREEN_ID);
            logId(SCREEN_ID.substring(0, 8));
            
            document.getElementById('media-container').innerHTML = `
                <div class="pair-display">
                    <p style="font-size:24px; opacity:0.8;">NEHAS SIGNAGE</p>
                    <div class="code-text">${code}</div>
                    <p style="font-size:18px;">ENTER THIS CODE IN DASHBOARD</p>
                </div>`;
            
            sbClient.channel('pair-watch').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'screens', filter: `id=eq.${SCREEN_ID}` }, payload => {
                if (payload.new.is_paired) location.reload();
            }).subscribe();
        }

        async function runSystem() {
            await sync();
            // Listen for any changes to playlist items for this specific screen
            sbClient.channel('pl-watch').on('postgres_changes', { event: '*', schema: 'public', table: 'playlist_items' }, () => {
                sync();
            }).subscribe();
            play();
        }

        async function sync() {
            // Simplified select to ensure we get results even if schema is partially missing
            const { data, error } = await sbClient.from('playlist_items')
                .select('duration_seconds, media!inner(*)')
                .eq('screen_id', SCREEN_ID);
            
            if (!error) { 
                playlist = data || []; 
                logCount(playlist.length); 
                logStatus(playlist.length > 0 ? "PLAYING" : "LOOP EMPTY");
            } else {
                logStatus("SYNC ERROR");
                console.error(error);
            }
        }

        async function play() {
            clearTimeout(loopTimer);
            const cont = document.getElementById('media-container');
            
            // Pulse heartbeat
            await sbClient.from('screens').update({ last_seen: new Date().toISOString() }).eq('id', SCREEN_ID);
            
            if (playlist.length === 0) {
                cont.innerHTML = `
                    <div style="color:white; text-align:center;">
                        <h2 style="font-family: 'Segoe UI', sans-serif;">ነሃስ ማስታወቂያ</h2>
                        <p style="opacity:0.6;">Waiting for media assignment...</p>
                    </div>`;
                loopTimer = setTimeout(play, 5000);
                return;
            }

            const item = playlist[currentIndex];
            currentIndex = (currentIndex + 1) % playlist.length;
            
            if (!item.media || !item.media.file_url) {
                play(); 
                return;
            }

            if (item.media.media_type === 'image') {
                cont.innerHTML = `<img src="${item.media.file_url}" style="width:100%; height:100%; object-fit:contain;">`;
                loopTimer = setTimeout(play, (item.duration_seconds || 10) * 1000);
            } else if (item.media.media_type === 'video') {
                cont.innerHTML = `<video src="${item.media.file_url}" autoplay muted style="width:100%; height:100%; object-fit:contain;"></video>`;
                const v = cont.querySelector('video');
                v.onended = play;
                v.onerror = () => { console.error("Video play error"); play(); };
            } else {
                // Handling Web Apps / URL types
                cont.innerHTML = `<iframe src="${item.media.file_url}" allow="autoplay; encrypted-media" style="width:100vw; height:100vh;"></iframe>`;
                loopTimer = setTimeout(play, (item.duration_seconds || 60) * 1000);
            }
        }
        boot();
    </script>
</body>
</html>
