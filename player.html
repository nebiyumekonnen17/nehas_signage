<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nehas Signage TV | ነሃስ ማስታወቂያ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: black; overflow: hidden; font-family: sans-serif; }
        #media-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        img, video, iframe { width: 100%; height: 100%; border: none; object-fit: contain; position: absolute; top: 0; left: 0; }
        .pair-code { color: white; font-size: 80px; font-family: monospace; text-align: center; z-index: 10; }
        
        /* DIAGNOSTIC BAR */
        #status-bar { 
            position: fixed; top: 0; left: 0; width: 100%; 
            background: rgba(0,0,0,0.7); color: #00ff00; 
            font-size: 12px; padding: 5px; z-index: 9999; 
            display: flex; gap: 15px; border-bottom: 1px solid #333;
        }
    </style>
</head>
<body>
    <div id="status-bar">
        <span>ID: <span id="stat-id">...</span></span>
        <span>Status: <span id="stat-msg">Initializing...</span></span>
        <span>Items: <span id="stat-count">0</span></span>
    </div>

    <div id="media-container"></div>

    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const sbClient = supabase.createClient(S_URL, S_KEY);

        let SCREEN_ID = localStorage.getItem('nehas_sid');
        let playlist = [];
        let currentIndex = 0;
        let loopTimer;

        // UI Helpers
        const updateStatus = (msg) => document.getElementById('stat-msg').innerText = msg;
        const updateCount = (count) => document.getElementById('stat-count').innerText = count;

        async function boot() {
            if (!SCREEN_ID) {
                showPairing();
            } else {
                document.getElementById('stat-id').innerText = SCREEN_ID.substring(0,8);
                const { data, error } = await sbClient.from('screens').select('*').eq('id', SCREEN_ID).single();
                
                if (error || !data || !data.is_paired) {
                    updateStatus("Device Not Paired/Found");
                    showPairing();
                } else {
                    start();
                }
            }
        }

        async function showPairing() {
            updateStatus("Awaiting Pairing...");
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            const { data } = await sbClient.from('screens').insert([{ pairing_code: code, is_paired: false }]).select();
            SCREEN_ID = data[0].id;
            localStorage.setItem('nehas_sid', SCREEN_ID);
            
            document.getElementById('media-container').innerHTML = `
                <div class="pair-code">
                    <p style="font-size:24px;">Pairing Code:</p>
                    ${code}
                </div>`;
            
            sbClient.channel('pairing').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'screens', filter: `id=eq.${SCREEN_ID}` }, payload => {
                if (payload.new.is_paired) location.reload();
            }).subscribe();
        }

        async function start() {
            updateStatus("Connected. Syncing...");
            await syncPlaylist();
            
            // Listen for changes and force re-sync
            sbClient.channel('pl-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'playlist_items' }, async () => {
                    updateStatus("Update Detected...");
                    await syncPlaylist();
                }).subscribe();

            play();
        }

        async function syncPlaylist() {
            // Using a simple join. If this returns 0 items, check your media table!
            const { data, error } = await sbClient
                .from('playlist_items')
                .select('duration_seconds, media!inner(*)') 
                .eq('screen_id', SCREEN_ID)
                .order('display_order', { ascending: true });

            if (error) {
                updateStatus("DB Sync Error: " + error.message);
                console.error(error);
            } else {
                playlist = data || [];
                updateCount(playlist.length);
                updateStatus(playlist.length > 0 ? "Playing" : "Playlist Empty");
            }
        }

        async function play() {
            clearTimeout(loopTimer);
            const container = document.getElementById('media-container');
            
            // Heartbeat
            await sbClient.from('screens').update({ last_seen: new Date().toISOString() }).eq('id', SCREEN_ID);

            if (playlist.length === 0) {
                container.innerHTML = `<div style="color:white; font-size:24px; text-align:center;">ነሃስ ማስታወቂያ<br><small>Add media from dashboard to start</small></div>`;
                loopTimer = setTimeout(play, 5000);
                return;
            }

            const item = playlist[currentIndex];
            currentIndex = (currentIndex + 1) % playlist.length;

            if (!item.media || !item.media.file_url) {
                updateStatus("Media Error: Skipping Item");
                play();
                return;
            }

            if (item.media.media_type === 'image') {
                container.innerHTML = `<img src="${item.media.file_url}">`;
                loopTimer = setTimeout(play, (item.duration_seconds || 10) * 1000);
            } 
            else if (item.media.media_type === 'video') {
                container.innerHTML = `<video src="${item.media.file_url}" autoplay muted style="background:black;"></video>`;
                const v = container.querySelector('video');
                v.onended = play;
                v.onerror = () => { updateStatus("Video Load Fail"); play(); };
            } 
            else if (item.media.media_type === 'url') {
                container.innerHTML = `<iframe src="${item.media.file_url}" allow="autoplay; encrypted-media"></iframe>`;
                loopTimer = setTimeout(play, (item.duration_seconds || 60) * 1000);
            }
        }

        boot();
    </script>
</body>
</html>
