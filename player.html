<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nehas Player | TV Display</title>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; cursor: none; }
        #media-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; display: flex; align-items: center; justify-content: center; background: #000; }
        .glass-card { background: rgba(15, 23, 42, 0.95); padding: 60px; border-radius: 40px; text-align: center; color: white; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; border: 1px solid rgba(255,255,255,0.1); }
        .brand-eng { font-size: 2.2rem; font-weight: 900; color: #3b82f6; margin-bottom: 5px; letter-spacing: 5px; }
        .brand-am { font-size: 1.6rem; color: #cbd5e1; margin-bottom: 25px; }
        #status { position: fixed; bottom: 15px; left: 20px; font-size: 11px; color: #3b82f6; opacity: 0.5; z-index: 999; font-family: monospace; }
    </style>
</head>
<body>
    <div id="media-container"></div>
    <div class="glass-card" id="ui-box">
        <div class="brand-eng">NEHAS SIGNAGE</div>
        <div class="brand-am">ነሃስ ማስታወቂያ</div>
        <div id="ui-content" style="font-size: 1.1rem; color: #94a3b8;">Connecting to Cloud...</div>
    </div>
    <div id="status">SYS_LOG: <span id="log-text">IDLE</span></div>

    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        
        const sbClient = supabase.createClient(S_URL, S_KEY);
        let SCREEN_ID = localStorage.getItem('nehas_sid');
        let currentPlaylist = [];
        let currentIndex = -1;
        let lastSignature = "";

        function updateLog(m) { document.getElementById('log-text').innerText = m; }

        async function boot() {
            updateLog("STARTING_BOOT");
            try {
                if (SCREEN_ID) {
                    const { data, error } = await sbClient.from('screens').select('*').eq('id', SCREEN_ID).maybeSingle();
                    if (data && data.is_paired) return startEngine();
                }
                register();
            } catch (e) {
                updateLog("BOOT_ERROR: " + e.message);
                document.getElementById('ui-content').innerText = "Connection Failed. Refreshing...";
                setTimeout(() => location.reload(), 5000);
            }
        }

        async function register() {
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            const { data } = await sbClient.from('screens').insert([{ name: 'New Display', pairing_code: code, is_paired: false }]).select();
            if (data && data[0]) {
                SCREEN_ID = data[0].id;
                localStorage.setItem('nehas_sid', SCREEN_ID);
                document.getElementById('ui-content').innerHTML = `<div style="font-size:5rem; font-weight:bold; color:white; margin:20px 0;">${code}</div><p>Pair this code in your Dashboard.</p>`;
                setInterval(async () => {
                    const { data: s } = await sbClient.from('screens').select('is_paired').eq('id', SCREEN_ID).maybeSingle();
                    if (s && s.is_paired) location.reload();
                }, 5000);
            }
        }

        function startEngine() {
            updateLog("ENGINE_LIVE");
            fetchPlaylist();
            setInterval(fetchPlaylist, 10000);
            // HEARTBEAT FIX: Pings every 15 seconds to keep "ONLINE" status green
            setInterval(() => {
                sbClient.from('screens').update({ last_seen: new Date().toISOString() }).eq('id', SCREEN_ID)
                .then(() => updateLog("HEARTBEAT_SENT"))
                .catch(e => updateLog("HEARTBEAT_FAIL"));
            }, 15000);
        }

        async function fetchPlaylist() {
            const { data } = await sbClient.from('playlist_items').select('id, duration, media(*)').eq('screen_id', SCREEN_ID).order('display_order', { ascending: true });
            const sig = data ? data.map(p => p.id).join(',') : "";
            if (sig !== lastSignature) {
                currentPlaylist = data || [];
                lastSignature = sig;
                currentIndex = -1;
                playNext();
            }
        }

        function playNext() {
            if (currentPlaylist.length === 0) {
                document.getElementById('ui-box').style.display = "block";
                document.getElementById('media-container').innerHTML = "";
                document.getElementById('ui-content').innerText = "Waiting for media...";
                return;
            }
            currentIndex = (currentIndex + 1) >= currentPlaylist.length ? 0 : currentIndex + 1;
            render(currentPlaylist[currentIndex]);
        }

        function render(item) {
            updateLog(`ACTIVE: ${item.media.media_type.toUpperCase()}`);
            document.getElementById('ui-box').style.display = "none";
            const cont = document.getElementById('media-container');
            if (item.media.media_type === 'image') {
                cont.innerHTML = `<img src="${item.media.file_url}" style="max-width:100%; max-height:100%; object-fit:contain">`;
                setTimeout(playNext, (item.duration || 10) * 1000);
            } else if (item.media.media_type === 'video') {
                cont.innerHTML = `<video id="v" src="${item.media.file_url}" autoplay muted style="width:100%; height:100%; object-fit:cover"></video>`;
                document.getElementById('v').onended = playNext;
            } else if (item.media.media_type === 'url') {
                cont.innerHTML = `<iframe id="yt" src="${item.media.file_url}&enablejsapi=1&autoplay=1&mute=1" style="width:100%; height:100%; border:none"></iframe>`;
                setTimeout(playNext, 60000); // Fallback for YT if API fails
            }
        }

        document.addEventListener('click', () => { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); });
        window.onload = boot;
    </script>
</body>
</html>
