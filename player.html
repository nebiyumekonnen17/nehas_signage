<!DOCTYPE html>
<html>
<head>
    <title>Nehas Player</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>body { background: black; margin: 0; overflow: hidden; color: white; font-family: sans-serif; }</style>
</head>
<body>
    <div id="display" style="width:100vw; height:100vh; display:flex; align-items:center; justify-content:center;"></div>
    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const sbClient = supabase.createClient(S_URL, S_KEY);
        let SCREEN_ID = localStorage.getItem('nehas_sid');

        async function boot() {
            if (!SCREEN_ID) {
                const code = Math.floor(100000 + Math.random() * 900000).toString();
                // FIX: Send a placeholder name to avoid "null" errors
                const { data } = await sbClient.from('screens').insert([{ name: 'New TV', pairing_code: code, is_paired: false }]).select();
                if (data) {
                    SCREEN_ID = data[0].id;
                    localStorage.setItem('nehas_sid', SCREEN_ID);
                    document.getElementById('display').innerHTML = `<h1>Code: ${code}</h1>`;
                    // Wait for pairing...
                    sbClient.channel('p').on('postgres_changes',{event:'UPDATE',schema:'public',table:'screens',filter:`id=eq.${SCREEN_ID}`},()=>location.reload()).subscribe();
                }
            } else {
                startLoop();
            }
        }

        async function startLoop() {
            const { data } = await sbClient.from('playlist_items').select('media!inner(*)').eq('screen_id', SCREEN_ID);
            if (data?.length) {
                const item = data[0].media;
                if (item.media_type === 'url') {
                    document.getElementById('display').innerHTML = `<iframe src="${item.file_url}" style="width:100%; height:100%; border:none;"></iframe>`;
                } else {
                    document.getElementById('display').innerHTML = `<img src="${item.file_url}" style="width:100%;">`;
                }
            }
        }
        boot();
    </script>
</body>
</html>
