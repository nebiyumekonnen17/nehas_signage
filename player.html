<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nehas Signage Player</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background-color: #0f172a; overflow: hidden; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', sans-serif; color: #fff; }
        #media-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        #media-container img { width: 100%; height: 100%; object-fit: contain; }
        
        /* Graphic Designs */
        .pairing-screen { text-align: center; background: #1e293b; padding: 60px; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); border: 2px solid #334155;}
        .pairing-code { font-size: 6rem; font-weight: bold; color: #3b82f6; letter-spacing: 10px; margin: 20px 0; background: #0f172a; padding: 20px 40px; border-radius: 12px;}
        
        .default-graphic { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .default-graphic h1 { font-size: 5rem; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); letter-spacing: 2px; }
        .default-graphic h2 { font-size: 3rem; margin-top: 15px; font-weight: 300; color: #93c5fd; }
        .default-graphic p { margin-top: 50px; font-size: 1.5rem; opacity: 0.7; border-top: 1px solid #3b82f6; padding-top: 30px; }
    </style>
</head>
<body>

    <div id="media-container">
        <h1>Initializing Display...</h1>
    </div>

    <script>
        const SUPABASE_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let SCREEN_ID = localStorage.getItem('nehas_screen_id');
        let playlist = [];
        let currentIndex = 0;
        let loopTimer;

        async function bootSequence() {
            if (!SCREEN_ID) {
                const newCode = Math.floor(100000 + Math.random() * 900000).toString();
                const { data, error } = await supabaseClient.from('screens')
                    .insert([{ name: 'Unpaired Display', pairing_code: newCode, is_paired: false }]).select();
                
                if (data) {
                    SCREEN_ID = data[0].id;
                    localStorage.setItem('nehas_screen_id', SCREEN_ID); 
                    renderPairingScreen(newCode);
                    listenForPairing();
                }
            } else {
                const { data } = await supabaseClient.from('screens').select('is_paired, pairing_code').eq('id', SCREEN_ID).single();
                
                if (data && data.is_paired) {
                    startSignage();
                } else if (data) {
                    renderPairingScreen(data.pairing_code);
                    listenForPairing();
                }
            }
        }

        function renderPairingScreen(code) {
            document.getElementById('media-container').innerHTML = `
                <div class="pairing-screen">
                    <h2>NEHAS SIGNAGE</h2>
                    <p style="font-size: 1.2rem; color: #94a3b8;">Enter this code in your Admin Dashboard to pair this screen.</p>
                    <div class="pairing-code">${code}</div>
                </div>`;
        }

        function renderDefaultGraphic() {
            document.getElementById('media-container').innerHTML = `
                <div class="default-graphic">
                    <h1>Nehas Digital Signage</h1>
                    <h2>ነሃስ ማስታወቂያ</h2>
                    <p>Ready for content.<br>Upload media from the dashboard.</p>
                </div>`;
        }

        function listenForPairing() {
            supabaseClient.channel('auth_channel').on('postgres_changes', 
                { event: 'UPDATE', schema: 'public', table: 'screens', filter: `id=eq.${SCREEN_ID}` },
                (payload) => {
                    if (payload.new.is_paired) {
                        startSignage();
                    }
                }
            ).subscribe();
        }

        function startSignage() {
            fetchPlaylist();
            subscribeToPlaylistChanges();
        }

        async function fetchPlaylist() {
            const { data } = await supabaseClient.from('playlist_items')
                .select(`duration_seconds, display_order, media ( file_url, media_type )`)
                .eq('screen_id', SCREEN_ID).order('display_order', { ascending: true });
            
            playlist = data || [];
            currentIndex = 0;
            playNext();
        }

        function playNext() {
            clearTimeout(loopTimer); 
            const container = document.getElementById('media-container');

            if (playlist.length === 0) {
                renderDefaultGraphic();
                return;
            }

            const currentItem = playlist[currentIndex];
            const mediaData = currentItem.media;

            currentIndex = (currentIndex + 1) % playlist.length;

            if (mediaData.media_type === 'image') {
                container.innerHTML = `<img src="${mediaData.file_url}" />`;
                loopTimer = setTimeout(playNext, currentItem.duration_seconds * 1000);
                
            } else if (mediaData.media_type === 'video') {
                container.innerHTML = `
                    <video id="signage-video" src="${mediaData.file_url}" autoplay muted style="width: 100%; height: 100%; object-fit: contain; outline: none;"></video>
                `;
                
                const vidElement = document.getElementById('signage-video');
                
                vidElement.onended = () => {
                    playNext();
                };
                
                vidElement.onerror = () => {
                    console.error("Video failed to play, skipping...");
                    playNext();
                };
            }
        }

        function subscribeToPlaylistChanges() {
            supabaseClient.channel('playlist_channel').on('postgres_changes',
                { event: '*', schema: 'public', table: 'playlist_items', filter: `screen_id=eq.${SCREEN_ID}` },
                () => { fetchPlaylist(); }
            ).subscribe();
        }

        bootSequence();
    </script>
</body>
</html>
