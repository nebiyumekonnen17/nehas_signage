<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nehas Signage Player | ነሃስ ማስታወቂያ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; 
        }

        #interactive-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background: url('https://output.googleusercontent.com/image_generation_content/0/generated_image.webp') no-repeat center center;
            background-size: cover;
            transition: opacity 1s ease-in-out;
        }

        #media-container {
            position: relative; width: 100%; height: 100%; z-index: 2;
            display: flex; align-items: center; justify-content: center;
        }

        .overlay-card {
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            color: white;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
        }

        .pairing-code { font-size: 6rem; font-weight: 800; color: #3b82f6; font-family: monospace; letter-spacing: 8px; margin: 20px 0; }
        
        #diag-bar { position: fixed; bottom: 10px; left: 15px; font-size: 10px; color: #00ff00; z-index: 100; font-family: monospace; }
    </style>
</head>
<body>

    <canvas id="interactive-bg"></canvas>
    <div id="media-container"></div>
    <div id="diag-bar">STATUS: <span id="log-status">READY</span></div>

    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFተIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const sbClient = supabase.createClient(S_URL, S_KEY);

        let SCREEN_ID = localStorage.getItem('nehas_sid');
        
        // --- 1. BOOT LOGIC (Fixing the Black Screen) ---
        async function boot() {
            document.getElementById('log-status').innerText = "BOOTING...";
            
            // Clear memory if it's a new window or broken ID
            if (!SCREEN_ID) {
                await startNewPairing();
            } else {
                const { data, error } = await sbClient.from('screens').select('*').eq('id', SCREEN_ID).maybeSingle();
                if (error || !data || !data.is_paired) {
                    await startNewPairing();
                } else {
                    startPlayer();
                }
            }
        }

        async function startNewPairing() {
            document.getElementById('log-status').innerText = "GENERATING CODE...";
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            
            try {
                const { data, error } = await sbClient.from('screens').insert([
                    { name: 'Nehas Display Unit', pairing_code: code, is_paired: false }
                ]).select();

                if (error) throw error;

                SCREEN_ID = data[0].id;
                localStorage.setItem('nehas_sid', SCREEN_ID);
                
                // DISPLAY THE CODE
                document.getElementById('media-container').innerHTML = `
                    <div class="overlay-card">
                        <div style="letter-spacing:3px; color:#3b82f6;">PAIRING REQUIRED</div>
                        <div class="pairing-code">${code}</div>
                        <div style="opacity:0.6;">Enter this code in the Nehas Admin Dashboard</div>
                    </div>
                `;

                // Listen for pairing update
                sbClient.channel('p').on('postgres_changes', { 
                    event: 'UPDATE', schema: 'public', table: 'screens', filter: `id=eq.${SCREEN_ID}` 
                }, () => location.reload()).subscribe();

            } catch (err) {
                document.getElementById('log-status').innerText = "DB ERROR: " + err.message;
                document.getElementById('media-container').innerHTML = `
                    <div class="overlay-card" style="border-color:red;">
                        <h3>DATABASE ERROR</h3>
                        <p>${err.message}</p>
                        <button onclick="location.reload()">Retry</button>
                    </div>`;
            }
        }

        // --- 2. PLAYER LOGIC ---
        async function startPlayer() {
            document.getElementById('log-status').innerText = "SYNCING...";
            // Hide BG for content
            document.getElementById('interactive-bg').style.opacity = "0";
            
            const { data } = await sbClient.from('playlist_items').select('media!inner(*)').eq('screen_id', SCREEN_ID);
            
            if (data && data.length > 0) {
                const item = data[0].media;
                if (item.media_type === 'url') {
                    document.getElementById('media-container').innerHTML = `<iframe src="${item.file_url}" style="width:100%; height:100%; border:none; background:white;"></iframe>`;
                } else {
                    document.getElementById('media-container').innerHTML = `<img src="${item.file_url}" style="width:100%; height:100%; object-fit:contain;">`;
                }
            } else {
                document.getElementById('interactive-bg').style.opacity = "1";
                document.getElementById('media-container').innerHTML = `<div class="overlay-card"><h2>Ready to Cast</h2><p>ነሃስ ማስታወቂያ</p></div>`;
            }
        }

        boot();
    </script>
</body>
</html>
