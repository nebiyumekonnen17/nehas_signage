<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nehas Admin | Screens</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #f8fafc; display: flex; height: 100vh; }
        .sidebar { width: 260px; background: #0f172a; color: white; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; padding: 30px 0; border-bottom: 1px solid #1e293b; margin: 0; letter-spacing: 2px; color: #3b82f6; }
        .nav-items { list-style: none; padding: 20px; margin: 0; }
        .nav-items a { text-decoration: none; color: #94a3b8; display: block; padding: 15px; border-radius: 10px; transition: 0.3s; margin-bottom: 10px; }
        .nav-items a:hover, .nav-items a.active { background: #3b82f6; color: white; font-weight: bold; }
        .main { flex: 1; padding: 50px; overflow-y: auto; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .screen-item { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #f1f5f9; border-radius: 12px; margin-bottom: 15px; }
        .screen-info h3 { margin: 0 0 5px 0; color: #1e293b; }
        .screen-actions button { padding: 8px 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-left: 10px; }
        .btn-edit { background: #e2e8f0; color: #475569; }
        .btn-del { background: #fee2e2; color: #ef4444; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>NEHAS ADMIN</h2>
        <ul class="nav-items">
            <li><a href="index.html">Dashboard Hub</a></li>
            <li><a href="screens.html" class="active">Screen Manager</a></li>
            <li><a href="library.html">Media Library</a></li>
        </ul>
    </div>

    <div class="main">
        <h1 style="color: #1e293b; margin-top: 0;">Active Displays</h1>
        <div class="card" id="screen-list">
            <p style="color:#94a3b8;">Loading displays...</p>
        </div>
    </div>

    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const sbClient = supabase.createClient(S_URL, S_KEY);

        async function loadScreens() {
            const { data } = await sbClient.from('screens').select('*').eq('is_paired', true);
            const list = document.getElementById('screen-list');
            
            if(data && data.length > 0) {
                list.innerHTML = data.map(s => `
                    <div class="screen-item">
                        <div class="screen-info">
                            <h3>${s.name}</h3>
                            <span style="color:#10b981; font-size:12px; font-weight:bold;">● ONLINE SYSTEM ID: ${s.id}</span>
                        </div>
                        <div class="screen-actions">
                            <button class="btn-edit" onclick="renameScreen(${s.id}, '${s.name}')">Rename</button>
                            <button class="btn-del" onclick="deleteScreen(${s.id})">Delete</button>
                        </div>
                    </div>
                `).join('');
            } else {
                list.innerHTML = "<p style='color:#94a3b8;'>No screens are currently paired.</p>";
            }
        }

        async function renameScreen(id, oldName) {
            const newName = prompt("Enter new name for this display:", oldName);
            if (newName && newName.trim() !== "") {
                await sbClient.from('screens').update({ name: newName }).eq('id', id);
                loadScreens();
            }
        }

        async function deleteScreen(id) {
            if (confirm("Are you sure you want to delete this TV? It will need to be re-paired.")) {
                await sbClient.from('playlist_items').delete().eq('screen_id', id);
                await sbClient.from('screens').delete().eq('id', id);
                loadScreens();
            }
        }

        window.onload = loadScreens;
    </script>
</body>
</html>
