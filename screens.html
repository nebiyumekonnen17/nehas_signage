<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nehas Admin | Screens</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #f8fafc; display: flex; height: 100vh; }
        .sidebar { width: 260px; background: #0f172a; color: white; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; padding: 30px 0; border-bottom: 1px solid #1e293b; margin: 0; letter-spacing: 2px; color: #3b82f6; }
        .nav-items { list-style: none; padding: 20px; margin: 0; }
        .nav-items a { text-decoration: none; color: #94a3b8; display: block; padding: 15px; border-radius: 10px; transition: 0.3s; margin-bottom: 10px; }
        .nav-items a:hover, .nav-items a.active { background: #3b82f6; color: white; font-weight: bold; }
        .main { flex: 1; padding: 50px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        input, button { width: 100%; padding: 15px; margin-top: 15px; border-radius: 10px; border: 1px solid #e2e8f0; font-size: 16px; box-sizing: border-box; }
        button { background: #3b82f6; color: white; border: none; font-weight: bold; cursor: pointer; }
        .screen-item { padding: 15px; background: #f1f5f9; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>NEHAS ADMIN</h2>
        <ul class="nav-items">
            <li><a href="index.html">Dashboard Hub</a></li>
            <li><a href="screens.html" class="active">Screen Manager</a></li>
            <li><a href="library.html">Media Library</a></li>
        </ul>
    </div>

    <div class="main">
        <h1 style="color: #1e293b; margin-top: 0;">Screen Manager</h1>
        <div class="grid">
            <div class="card">
                <h3>Pair New TV</h3>
                <input type="text" id="p-code" placeholder="Enter 6-Digit Code" maxlength="6" style="font-family: monospace; font-size: 24px; text-align: center; letter-spacing: 5px;">
                <input type="text" id="p-name" placeholder="Display Name (e.g. Main Lobby)">
                <button onclick="pairTV()">Link Device</button>
                <div id="status" style="margin-top: 15px; text-align: center; font-weight: bold;"></div>
            </div>
            <div class="card">
                <h3>Active Screens</h3>
                <div id="screen-list"><p style="color:#94a3b8;">Loading...</p></div>
            </div>
        </div>
    </div>

    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const sbClient = supabase.createClient(S_URL, S_KEY);

        async function loadScreens() {
            const { data } = await sbClient.from('screens').select('*').eq('is_paired', true);
            const list = document.getElementById('screen-list');
            if(data && data.length > 0) {
                list.innerHTML = data.map(s => `
                    <div class="screen-item">
                        <strong>${s.name}</strong>
                        <span style="color:#10b981; font-size:12px; font-weight:bold;">● ONLINE</span>
                    </div>
                `).join('');
            } else {
                list.innerHTML = "<p style='color:#94a3b8;'>No screens paired yet.</p>";
            }
        }

        async function pairTV() {
            const code = document.getElementById('p-code').value.trim();
            const name = document.getElementById('p-name').value.trim();
            const status = document.getElementById('status');

            if(!code || !name) return status.innerText = "Please fill all fields.";
            
            status.style.color = "#3b82f6";
            status.innerText = "Searching...";

            const { data } = await sbClient.from('screens').select('id').eq('pairing_code', code).eq('is_paired', false).maybeSingle();

            if (data) {
                await sbClient.from('screens').update({ name: name, is_paired: true, pairing_code: null }).eq('id', data.id);
                status.style.color = "#10b981";
                status.innerText = "Success! TV Linked.";
                document.getElementById('p-code').value = '';
                document.getElementById('p-name').value = '';
                loadScreens();
            } else {
                status.style.color = "#ef4444";
                status.innerText = "Invalid Code.";
            }
        }

        window.onload = loadScreens;
    </script>
</body>
</html>
