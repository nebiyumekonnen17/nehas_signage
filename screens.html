<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screens Manager | ነሃስ ማስታወቂያ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #f4f6f8; height: 100vh; display: flex; }
        .sidebar { width: 250px; background-color: #1e293b; color: white; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; padding: 20px 0; border-bottom: 1px solid #334155; margin: 0; }
        .amharic-sub { display: block; font-size: 0.8rem; color: #94a3b8; margin-top: 4px; font-weight: normal; }
        .nav-items { list-style: none; padding: 0; margin: 0; }
        .nav-items li { padding: 15px 20px; border-bottom: 1px solid #334155; cursor: pointer; }
        .nav-items li.active { background-color: #3b82f6; }
        .main-content { flex: 1; padding: 30px; display: flex; gap: 20px; overflow: hidden; }
        .screen-list { width: 320px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .screen-item { padding: 15px; border-bottom: 1px solid #f1f5f9; cursor: pointer; position: relative; padding-left: 40px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; position: absolute; left: 15px; top: 20px; border: 2px solid white; }
        .online { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .offline { background: #ef4444; }
        .playlist-panel { flex: 1; background: white; border-radius: 8px; display: flex; flex-direction: column; }
        .panel-header { padding: 15px; border-bottom: 1px solid #e2e8f0; font-weight: bold; background: #f8fafc; }
        .playlist-grid { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; overflow-y: auto; }
        .media-card { border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; text-align: center; }
        .media-preview { width: 100%; height: 110px; object-fit: cover; background: #000; }
        .delete-btn { width: 100%; background: #fee2e2; color: #dc2626; border: none; padding: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>NEHAS SIGNAGE<span class="amharic-sub">ነሃስ ማስታወቂያ</span></h2>
        <ul class="nav-items">
            <li onclick="location.href='index.html'">Dashboard</li>
            <li class="active" onclick="location.href='screens.html'">Screens Manager</li>
            <li onclick="location.href='library.html'">Media Library</li>
        </ul>
    </div>
    <div class="main-content">
        <div class="screen-list">
            <div class="panel-header">Connected Displays</div>
            <div id="screen-container"></div>
        </div>
        <div class="playlist-panel">
            <div class="panel-header" id="p-title">Select a display</div>
            <div id="playlist-container" class="playlist-grid"></div>
        </div>
    </div>
    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const sbClient = window.supabase.createClient(S_URL, S_KEY);
        let activeId = null;

        async function load() {
            const { data } = await sbClient.from('screens').select('*').eq('is_paired', true).order('name');
            const cont = document.getElementById('screen-container');
            cont.innerHTML = data?.map(s => {
                const isOnline = (new Date() - new Date(s.last_seen)) < 180000;
                return `<div class="screen-item" onclick="sel('${s.id}', '${s.name}')"><div class="status-dot ${isOnline ? 'online' : 'offline'}"></div><b>${s.name}</b></div>`;
            }).join('') || '';
        }

        async function sel(id, name) { activeId = id; document.getElementById('p-title').textContent = "Live Loop: " + name; fetchPl(); }

        async function fetchPl() {
            const { data } = await sbClient.from('playlist_items').select(`id, media ( file_url, file_name, media_type )`).eq('screen_id', activeId);
            document.getElementById('playlist-container').innerHTML = data?.map(item => `
                <div class="media-card">
                    ${item.media.media_type === 'video' ? '<div class="media-preview" style="color:white;display:flex;align-items:center;justify-content:center;">VIDEO</div>' : `<img src="${item.media.file_url}" class="media-preview">`}
                    <div style="padding:10px;font-size:12px;">${item.media.file_name}</div>
                    <button class="delete-btn" onclick="rem('${item.id}')">Remove</button>
                </div>
            `).join('') || 'Empty loop.';
        }

        async function rem(id) { if(confirm('Remove?')) { await sbClient.from('playlist_items').delete().eq('id', id); fetchPl(); } }
        load(); setInterval(load, 30000);
    </script>
</body>
</html>
