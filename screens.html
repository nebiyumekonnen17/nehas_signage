<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nehas Admin | Screens</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #f8fafc; display: flex; height: 100vh; }
        .sidebar { width: 260px; background: #0f172a; color: white; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; padding: 30px 0; border-bottom: 1px solid #1e293b; margin: 0; letter-spacing: 2px; color: #3b82f6; }
        .nav-items { list-style: none; padding: 20px; margin: 0; }
        .nav-items a { text-decoration: none; color: #94a3b8; display: block; padding: 15px; border-radius: 10px; transition: 0.3s; margin-bottom: 10px; }
        .nav-items a:hover, .nav-items a.active { background: #3b82f6; color: white; font-weight: bold; }
        .main { flex: 1; padding: 50px; overflow-y: auto; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .screen-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 20px; background: #f1f5f9; border-radius: 12px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .screen-info { flex: 1; }
        .screen-info h3 { margin: 0 0 5px 0; color: #1e293b; }
        
        .playlist-box { margin-top: 15px; padding: 15px; background: white; border-radius: 8px; border: 1px solid #cbd5e1; }
        .playlist-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 13px; font-weight: bold; }
        .playlist-item:last-child { border-bottom: none; }
        
        .btn-remove-item { background: #ef4444; color: white; border: none; border-radius: 5px; padding: 4px 8px; cursor: pointer; font-size: 11px; }
        .btn-remove-item:hover { background: #dc2626; }

        .screen-actions { display: flex; flex-direction: column; gap: 8px; margin-left: 20px; }
        .screen-actions button { padding: 10px 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 13px; width: 100%; }
        .screen-actions button:hover { filter: brightness(0.9); }
        
        .btn-edit { background: #e2e8f0; color: #475569; }
        .btn-del { background: #fee2e2; color: #ef4444; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>NEHAS ADMIN</h2>
        <ul class="nav-items">
            <li><a href="index.html">Dashboard Hub</a></li>
            <li><a href="screens.html" class="active">Screen Manager</a></li>
            <li><a href="library.html">Media Library</a></li>
        </ul>
    </div>

    <div class="main">
        <h1 style="color: #1e293b; margin-top: 0;">Active Displays</h1>
        <p style="color: #64748b;">Manage your network and curate playlists for each TV.</p>
        <div class="card" id="screen-list">
            <p style="color:#94a3b8;">Loading displays...</p>
        </div>
    </div>

    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const sbClient = supabase.createClient(S_URL, S_KEY);

        async function loadScreens() {
            const list = document.getElementById('screen-list');
            
            const { data: screens } = await sbClient.from('screens').select('*').eq('is_paired', true);
            const { data: playlists } = await sbClient.from('playlist_items').select('id, screen_id, media_id, duration').order('id', { ascending: true });
            const { data: allMedia } = await sbClient.from('media').select('id, file_name, media_type');
            
            if(screens && screens.length > 0) {
                list.innerHTML = screens.map(s => {
                    const safeNameForJS = s.name ? s.name.replace(/'/g, "\\'") : 'Unnamed';
                    const safeNameForHTML = s.name ? s.name.replace(/"/g, '&quot;').replace(/'/g, '&#39;') : 'Unnamed';

                    // Get all items queued for this screen
                    const screenQueue = playlists?.filter(p => p.screen_id === s.id) || [];
                    let playlistHtml = "<p style='color:#ef4444; margin:0; font-size:13px; font-weight:bold;'>Playlist Empty</p>";
                    
                    if (screenQueue.length > 0) {
                        playlistHtml = screenQueue.map((item, index) => {
                            const mData = allMedia?.find(m => m.id === item.media_id);
                            if (mData) {
                                const mName = mData.file_name ? mData.file_name.replace(/"/g, '&quot;').replace(/'/g, '&#39;') : 'Unnamed';
                                const timeCode = mData.media_type === 'image' ? `(${item.duration}s)` : `(Auto)`;
                                return `
                                    <div class="playlist-item">
                                        <span style="color:#3b82f6;">${index + 1}. ${mName} <span style="color:#94a3b8; font-size:11px;">${timeCode}</span></span>
                                        <button class="btn-remove-item" onclick="removePlaylistItem('${item.id}')">X</button>
                                    </div>
                                `;
                            }
                            return '';
                        }).join('');
                    }

                    return `
                        <div class="screen-item">
                            <div class="screen-info">
                                <h3 style="margin-bottom:2px;">${safeNameForHTML}</h3>
                                <span style="color:#10b981; font-size:12px; font-weight:bold;">● ONLINE</span>
                                <div class="playlist-box">
                                    <div style="font-size:11px; color:#64748b; margin-bottom:8px; text-transform:uppercase; letter-spacing:1px;">Current Playlist</div>
                                    ${playlistHtml}
                                </div>
                            </div>
                            <div class="screen-actions">
                                <button class="btn-edit" onclick="renameScreen('${s.id}', '${safeNameForJS}')">Rename TV</button>
                                <button class="btn-del" onclick="deleteScreen('${s.id}')">Delete TV</button>
                            </div>
                        </div>
                    `;
                }).join('');
            } else {
                list.innerHTML = "<p style='color:#94a3b8;'>No screens are currently paired.</p>";
            }
        }

        // Deletes ONLY the specific video/image from the queue
        async function removePlaylistItem(playlistItemId) {
            await sbClient.from('playlist_items').delete().eq('id', playlistItemId);
            loadScreens(); 
        }

        async function renameScreen(id, oldName) {
            const newName = prompt("Enter new name for this display:", oldName);
            if (newName && newName.trim() !== "") {
                await sbClient.from('screens').update({ name: newName }).eq('id', id);
                loadScreens(); 
            }
        }

        async function deleteScreen(id) {
            if (confirm("Are you sure you want to delete this TV?")) {
                await sbClient.from('playlist_items').delete().eq('screen_id', id);
                await sbClient.from('screens').delete().eq('id', id);
                loadScreens(); 
            }
        }

        window.onload = loadScreens;
    </script>
</body>
</html>
