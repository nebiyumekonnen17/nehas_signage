<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nehas Player | ነሃስ ማስታወቂያ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: black; overflow: hidden; font-family: 'Segoe UI', sans-serif; 
        }
        
        #media-container { 
            width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; 
            position: relative; 
        }

        img, video, iframe { 
            width: 100%; height: 100%; 
            border: none; object-fit: contain; 
            position: absolute; top: 0; left: 0;
        }

        /* Pairing Display */
        .pair-display { 
            color: white; text-align: center; z-index: 10; 
            animation: fadeIn 0.5s ease;
        }
        .code-text { 
            font-size: 110px; font-weight: bold; color: #3b82f6; 
            margin: 20px 0; font-family: monospace; letter-spacing: 10px;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }
        
        /* Diagnostic Bar (Bottom) */
        #diag-bar { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(0,0,0,0.85); color: #00ff00; 
            font-size: 11px; padding: 6px 15px; z-index: 100; 
            font-family: monospace; display: flex; gap: 25px;
            border-top: 1px solid #333;
        }

        .diag-label { color: #888; margin-right: 5px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="media-container"></div>
    
    <div id="diag-bar">
        <span><span class="diag-label">STATUS:</span> <span id="log-status">INIT</span></span>
        <span><span class="diag-label">ID:</span> <span id="log-id">...</span></span>
        <span><span class="diag-label">ITEMS:</span> <span id="log-count">0</span></span>
    </div>

    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const sbClient = supabase.createClient(S_URL, S_KEY);

        let SCREEN_ID = localStorage.getItem('nehas_sid');
        let playlist = [];
        let currentIndex = 0;
        let loopTimer;

        const updateDiag = (id, val) => {
            const el = document.getElementById(id);
            if (el) el.innerText = val;
        };

        async function boot() {
            if (!SCREEN_ID) {
                await startPairing();
            } else {
                updateDiag('log-id', SCREEN_ID.substring(0,8));
                const { data, error } = await sbClient.from('screens').select('*').eq('id', SCREEN_ID).maybeSingle();
                
                if (error || !data || !data.is_paired) {
                    updateDiag('log-status', "UNPAIRED/NOT FOUND");
                    await startPairing();
                } else {
                    updateDiag('log-status', "CONNECTED");
                    initializePlayer();
                }
            }
        }

        async function startPairing() {
            updateDiag('log-status', "AWAITING PAIRING");
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            
            // Insert with default name to satisfy DB constraints
            const { data, error } = await sbClient.from('screens').insert([{ 
                name: 'Display ' + code.substring(0,3), 
                pairing_code: code, 
                is_paired: false 
            }]).select();
            
            if (error || !data) {
                updateDiag('log-status', "DB ERROR: " + error?.message);
                return;
            }

            SCREEN_ID = data[0].id;
            localStorage.setItem('nehas_sid', SCREEN_ID);
            updateDiag('log-id', SCREEN_ID.substring(0,8));
            
            document.getElementById('media-container').innerHTML = `
                <div class="pair-display">
                    <p style="font-size: 24px; letter-spacing: 2px; opacity: 0.8;">NEHAS SIGNAGE</p>
                    <div class="code-text">${code}</div>
                    <p style="font-size: 18px; opacity: 0.6;">ENTER CODE ON DASHBOARD</p>
                </div>`;
            
            // Realtime listener for the pairing event
            sbClient.channel('pairing').on('postgres_changes', { 
                event: 'UPDATE', schema: 'public', table: 'screens', filter: `id=eq.${SCREEN_ID}` 
            }, payload => {
                if (payload.new.is_paired) {
                    updateDiag('log-status', "PAIRED!");
                    location.reload();
                }
            }).subscribe();
        }

        async function initializePlayer() {
            await syncPlaylist();
            
            // Realtime sync for playlist changes
            sbClient.channel('loop-sync').on('postgres_changes', { 
                event: '*', schema: 'public', table: 'playlist_items' 
            }, async () => {
                updateDiag('log-status', "SYNCING...");
                await syncPlaylist();
            }).subscribe();
            
            // Fallback sync every 30s for browser-sleep scenarios
            setInterval(syncPlaylist, 30000);
            
            play();
        }

        async function syncPlaylist() {
            const { data, error } = await sbClient.from('playlist_items')
                .select('duration_seconds, media!inner(*)')
                .eq('screen_id', SCREEN_ID)
                .order('display_order', { ascending: true });
            
            if (!error) {
                playlist = data || [];
                updateDiag('log-count', playlist.length);
                updateDiag('log-status', playlist.length > 0 ? "PLAYING" : "LOOP EMPTY");
            } else {
                updateDiag('log-status', "SYNC ERROR");
            }
        }

        async function play() {
            clearTimeout(loopTimer);
            const container = document.getElementById('media-container');
            
            // Heartbeat update
            await sbClient.from('screens').update({ last_seen: new Date().toISOString() }).eq('id', SCREEN_ID);

            if (playlist.length === 0) {
                container.innerHTML = `
                    <div style="color:white; text-align:center;">
                        <h2 style="font-size: 32px; letter-spacing: 2px;">ነሃስ ማስታወቂያ</h2>
                        <p style="opacity:0.5;">No items in loop. Assign media from dashboard.</p>
                    </div>`;
                loopTimer = setTimeout(play, 5000);
                return;
            }

            if (currentIndex >= playlist.length) currentIndex = 0;
            const item = playlist[currentIndex];
            currentIndex = (currentIndex + 1) % playlist.length;

            if (!item.media || !item.media.file_url) {
                play();
                return;
            }

            if (item.media.media_type === 'image') {
                container.innerHTML = `<img src="${item.media.file_url}">`;
                loopTimer = setTimeout(play, (item.duration_seconds || 10) * 1000);
            } 
            else if (item.media.media_type === 'video') {
                container.innerHTML = `<video src="${item.media.file_url}" autoplay muted style="background:black;"></video>`;
                const v = container.querySelector('video');
                v.onended = play;
                v.onerror = play;
            } 
            else if (item.media.media_type === 'url') {
                // For YouTube and Web Apps
                container.innerHTML = `<iframe src="${item.media.file_url}" allow="autoplay; encrypted-media; fullscreen" style="background: white;"></iframe>`;
                loopTimer = setTimeout(play, (item.duration_seconds || 60) * 1000);
            }
        }

        window.onload = boot;
    </script>
</body>
</html>
