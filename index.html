<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nehas Signage Admin | ነሃስ ማስታወቂያ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #3b82f6; --purple: #8b5cf6; --green: #10b981; --dark: #1e293b; --bg: #f4f6f8; --text: #334155; }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); height: 100vh; display: flex; overflow: hidden; }
        .sidebar { width: 250px; background: var(--dark); color: white; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; padding: 20px 0; border-bottom: 1px solid #334155; margin: 0; font-size: 1.1rem; }
        .amharic-sub { display: block; font-size: 0.8rem; color: #94a3b8; margin-top: 4px; }
        .nav-items { list-style: none; padding: 0; margin: 0; }
        .nav-items li { padding: 15px 20px; border-bottom: 1px solid #334155; cursor: pointer; transition: 0.2s; }
        .nav-items li.active { background: var(--primary); font-weight: bold; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .view-section { display: none; flex-direction: column; }
        .view-section.active { display: flex; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 5px solid var(--primary); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .status-msg { margin-top: 10px; text-align: center; font-size: 13px; font-weight: bold; min-height: 1.2em; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>NEHAS SIGNAGE<span class="amharic-sub">ነሃስ ማስታወቂያ</span></h2>
        <ul class="nav-items">
            <li id="nav-dashboard" class="active" onclick="switchView('dashboard')">Dashboard</li>
            <li onclick="switchView('screens')">Screens Manager</li>
            <li onclick="switchView('library')">Media Library</li>
        </ul>
    </div>

    <div class="main-content">
        <div id="view-dashboard" class="view-section active">
            <h1>Control Dashboard</h1>
            <div class="grid-container">
                <div class="card" style="border-top-color: var(--purple);">
                    <h3>🧩 Apps Marketplace</h3>
                    <div class="form-group">
                        <label>App Type</label>
                        <select id="app-type">
                            <option value="youtube">YouTube Video</option>
                            <option value="insta">Social Media Feed</option>
                            <option value="news">News Ticker</option>
                            <option value="slides">Google Slides</option>
                            <option value="menu">Digital Menu Board</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>URL / Embed Link</label>
                        <input type="text" id="app-url-input" placeholder="Paste link here...">
                    </div>
                    <div class="form-group">
                        <label>Target Screen</label>
                        <select class="screen-selector" id="app-screen-select"></select>
                    </div>
                    <div class="form-group">
                        <label>Duration (Seconds)</label>
                        <input type="number" id="app-duration" value="60">
                    </div>
                    <button onclick="deployApp()" style="background:var(--purple);" id="btn-app">Deploy App to Screen</button>
                    <div id="app-status" class="status-msg"></div>
                </div>

                <div class="card" style="border-top-color: var(--green);">
                    <h3>📺 Pair New Display</h3>
                    <div class="form-group">
                        <label>6-Digit Code</label>
                        <input type="text" id="pair-code" placeholder="000000">
                    </div>
                    <div class="form-group">
                        <label>Display Name</label>
                        <input type="text" id="pair-name" placeholder="Lobby TV">
                    </div>
                    <button onclick="pairScreen()" style="background:var(--green);">Pair Screen</button>
                    <div id="pair-status" class="status-msg"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const sbClient = supabase.createClient(S_URL, S_KEY);

        async function loadScreenSelectors() {
            const { data } = await sbClient.from('screens').select('id, name').eq('is_paired', true);
            const selectors = document.querySelectorAll('.screen-selector');
            selectors.forEach(sel => {
                sel.innerHTML = data?.map(s => `<option value="${s.id}">${s.name}</option>`).join('') || '<option value="">No screens paired</option>';
            });
        }

        async function deployApp() {
            const sid = document.getElementById('app-screen-select').value;
            let url = document.getElementById('app-url-input').value.trim();
            const dur = document.getElementById('app-duration').value;
            const status = document.getElementById('app-status');
            const btn = document.getElementById('btn-app');

            if(!url || !sid) return alert("Select a screen and provide a URL.");

            // YouTube Formatting
            if(url.includes("watch?v=")) {
                url = url.replace("watch?v=", "embed/") + "?autoplay=1&mute=1&controls=0";
            }

            btn.disabled = true;
            status.style.color = "blue";
            status.textContent = "Deploying App...";

            // 1. Create Media record
            const { data: mData, error: mErr } = await sbClient.from('media').insert([{ 
                file_name: "Signage App", 
                file_url: url, 
                media_type: 'url' 
            }]).select();

            if (mErr) { 
                status.style.color = "red";
                status.textContent = "DB Error: " + mErr.message;
                btn.disabled = false;
                return;
            }

            // 2. Add to Screen's Playlist
            const { error: pErr } = await sbClient.from('playlist_items').insert([{ 
                screen_id: sid, 
                media_id: mData[0].id, 
                duration_seconds: dur 
            }]);

            if (pErr) {
                status.style.color = "red";
                status.textContent = "Playlist Error: " + pErr.message;
            } else {
                status.style.color = "green";
                status.textContent = "✅ App Deployed! Check TV Count.";
                document.getElementById('app-url-input').value = "";
            }
            btn.disabled = false;
        }

        async function pairScreen() {
            const c = document.getElementById('pair-code').value;
            const n = document.getElementById('pair-name').value;
            const status = document.getElementById('pair-status');
            const { data } = await sbClient.from('screens').select('id').eq('pairing_code', c).eq('is_paired', false);
            
            if(data?.length) {
                await sbClient.from('screens').update({ name: n, is_paired: true, pairing_code: null }).eq('id', data[0].id);
                status.style.color = "green";
                status.textContent = "✅ Screen Paired!";
                loadScreenSelectors();
            } else {
                status.style.color = "red";
                status.textContent = "Invalid Code.";
            }
        }

        function switchView(name) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${name}`).classList.add('active');
            if(name === 'dashboard') loadScreenSelectors();
        }

        window.onload = () => loadScreenSelectors();
    </script>
</body>
</html>
