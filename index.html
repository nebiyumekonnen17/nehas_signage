<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nehas Signage Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f8; height: 100vh; display: flex; }
        .sidebar { width: 250px; background-color: #1e293b; color: white; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; padding: 20px 0; margin: 0; border-bottom: 1px solid #334155; font-size: 1.4rem; letter-spacing: 1px; }
        .amharic-sub { display: block; font-size: 0.9rem; font-weight: normal; color: #94a3b8; margin-top: 5px; }
        .nav-items { list-style: none; padding: 0; margin: 0; }
        .nav-items li { padding: 15px 20px; border-bottom: 1px solid #334155; cursor: pointer; transition: background 0.2s; }
        .nav-items li:hover, .nav-items li.active { background-color: #3b82f6; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .header { margin-bottom: 30px; }
        .header h1 { margin: 0; color: #0f172a; font-size: 1.8rem; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1000px; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #475569; font-weight: 600; font-size: 0.95rem; }
        input[type="text"], input[type="file"], input[type="number"], select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; background-color: #f8fafc; font-size: 1rem; }
        input[type="file"] { padding: 8px; background-color: white; }
        button { background-color: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: background 0.2s; width: 100%; }
        button:hover { background-color: #2563eb; }
        button.success-btn { background-color: #10b981; }
        button.success-btn:hover { background-color: #059669; }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; }
        .status-msg { margin-top: 15px; font-weight: bold; text-align: center; min-height: 20px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>NEHAS SIGNAGE<span class="amharic-sub">ነሃስ ማስታወቂያ</span></h2>
        <ul class="nav-items">
            <li class="active" onclick="location.href='index.html'">Dashboard</li>
            <li onclick="location.href='screens.html'">Screens Manager</li>
            <li>Media Library</li>
        </ul>
    </div>
    <div class="main-content">
        <div class="header">
            <h1>System Dashboard</h1>
        </div>
        
        <div class="grid-container">
            <div class="card" style="border-top: 4px solid #10b981;">
                <h3 style="margin-top: 0;">Add New Screen</h3>
                <p style="color: #64748b; font-size: 0.9rem; margin-top: -10px; margin-bottom: 25px;">Enter the 6-digit code shown on your TV.</p>
                
                <div class="form-group">
                    <label>Pairing Code</label>
                    <input type="text" id="pair-code" placeholder="e.g. 123456" maxlength="6">
                </div>
                <div class="form-group">
                    <label>Give this Screen a Name</label>
                    <input type="text" id="pair-name" placeholder="e.g. Lobby Main TV">
                </div>
                <button class="success-btn" onclick="pairScreen()" id="pair-btn">Pair Screen</button>
                <div id="pair-status" class="status-msg"></div>
            </div>

            <div class="card" style="border-top: 4px solid #3b82f6;">
                <h3 style="margin-top: 0;">Upload Content</h3>
                <p style="color: #64748b; font-size: 0.9rem; margin-top: -10px; margin-bottom: 25px;">Push media to a paired screen.</p>
                
                <div class="form-group">
                    <label>Target Screen</label>
                    <select id="screen-select">
                        <option value="">Loading paired screens...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Select Image</label>
                    <input type="file" id="media-file" accept="image/png, image/jpeg, image/webp" required>
                </div>
                <div class="form-group">
                    <label>Display Duration (Seconds)</label>
                    <input type="number" id="duration" value="10" min="1" required>
                </div>
                <button onclick="uploadAndDeploy()" id="deploy-btn">Upload & Deploy</button>
                <div id="deploy-status" class="status-msg"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const BUCKET_NAME = 'signage-media';

        async function loadScreens() {
            // Only load screens that have been paired
            const { data: screens, error } = await supabaseClient.from('screens').select('id, name').eq('is_paired', true).order('name');
            const select = document.getElementById('screen-select');
            select.innerHTML = ''; 
            
            if (error || screens.length === 0) {
                select.innerHTML = '<option value="">No paired screens found.</option>';
                return;
            }
            screens.forEach(screen => {
                const option = document.createElement('option');
                option.value = screen.id;
                option.textContent = screen.name;
                select.appendChild(option);
            });
        }

        async function pairScreen() {
            const code = document.getElementById('pair-code').value.trim();
            const name = document.getElementById('pair-name').value.trim();
            const statusMsg = document.getElementById('pair-status');

            if (!code || !name) {
                statusMsg.style.color = '#dc2626';
                statusMsg.textContent = "Please enter both a code and a name.";
                return;
            }

            statusMsg.style.color = '#3b82f6';
            statusMsg.textContent = "Searching for screen...";

            // 1. Find the screen with this code
            const { data, error } = await supabaseClient.from('screens').select('id').eq('pairing_code', code).eq('is_paired', false);
            
            if (error || data.length === 0) {
                statusMsg.style.color = '#dc2626';
                statusMsg.textContent = "Invalid code or screen already paired.";
                return;
            }

            const targetScreenId = data[0].id;

            // 2. Update the screen to paired
            const { error: updateError } = await supabaseClient.from('screens')
                .update({ name: name, is_paired: true, pairing_code: null })
                .eq('id', targetScreenId);

            if (updateError) {
                statusMsg.style.color = '#dc2626';
                statusMsg.textContent = "Error pairing screen.";
                return;
            }

            statusMsg.style.color = '#10b981';
            statusMsg.textContent = "Screen successfully paired!";
            document.getElementById('pair-code').value = '';
            document.getElementById('pair-name').value = '';
            
            loadScreens(); // Refresh the dropdown
        }

        async function uploadAndDeploy() {
            const screenId = document.getElementById('screen-select').value;
            const fileInput = document.getElementById('media-file');
            const duration = document.getElementById('duration').value;
            const statusMsg = document.getElementById('deploy-status');
            const deployBtn = document.getElementById('deploy-btn');

            if (!screenId || fileInput.files.length === 0) {
                statusMsg.style.color = '#dc2626';
                statusMsg.textContent = "Please select a screen and a file.";
                return;
            }

            const file = fileInput.files[0];
            deployBtn.disabled = true;
            deployBtn.textContent = "Processing...";
            statusMsg.style.color = '#3b82f6';
            statusMsg.textContent = "Uploading file...";

            try {
                const fileExt = file.name.split('.').pop();
                const fileName = `${Math.random().toString(36).substring(2, 15)}_${Date.now()}.${fileExt}`;
                const filePath = `uploads/${fileName}`;

                const { error: uploadError } = await supabaseClient.storage.from(BUCKET_NAME).upload(filePath, file);
                if (uploadError) throw new Error("Upload failed.");

                statusMsg.textContent = "Updating database...";
                const { data: urlData } = supabaseClient.storage.from(BUCKET_NAME).getPublicUrl(filePath);
                
                const { data: mediaData, error: mediaError } = await supabaseClient.from('media').insert([{ file_name: file.name, file_url: urlData.publicUrl, media_type: 'image' }]).select();
                if (mediaError) throw new Error("Database error.");
                
                const { data: currentPlaylist } = await supabaseClient.from('playlist_items').select('display_order').eq('screen_id', screenId).order('display_order', { ascending: false }).limit(1);
                let nextOrder = (currentPlaylist && currentPlaylist.length > 0) ? currentPlaylist[0].display_order + 1 : 1;

                const { error: playlistError } = await supabaseClient.from('playlist_items').insert([{ screen_id: screenId, media_id: mediaData[0].id, display_order: nextOrder, duration_seconds: duration }]);
                if (playlistError) throw new Error("Playlist error.");

                statusMsg.style.color = '#10b981';
                statusMsg.textContent = "Success! Media deployed.";
                fileInput.value = ''; 
            } catch (err) {
                statusMsg.style.color = '#dc2626';
                statusMsg.textContent = err.message || "An error occurred.";
            } finally {
                deployBtn.disabled = false;
                deployBtn.textContent = "Upload & Deploy";
            }
        }

        loadScreens();
    </script>
</body>
</html>
