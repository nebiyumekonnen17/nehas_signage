<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nehas Signage Admin | ነሃስ ማስታወቂያ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #f4f6f8; height: 100vh; display: flex; }
        .sidebar { width: 250px; background-color: #1e293b; color: white; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; padding: 20px 0; border-bottom: 1px solid #334155; margin: 0; }
        .amharic-sub { display: block; font-size: 0.8rem; color: #94a3b8; margin-top: 4px; font-weight: normal; }
        .nav-items { list-style: none; padding: 0; margin: 0; }
        .nav-items li { padding: 15px 20px; border-bottom: 1px solid #334155; cursor: pointer; transition: 0.2s; }
        .nav-items li:hover, .nav-items li.active { background-color: #3b82f6; }
        
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1000px; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 4px solid #3b82f6; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #475569; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; }
        
        .file-details { margin-top: 10px; padding: 10px; background: #f1f5f9; border-radius: 4px; display: none; font-size: 0.85rem; }
        button { background-color: #3b82f6; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button:hover { background-color: #2563eb; }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; }
        
        .progress-wrapper { margin-top: 20px; display: none; }
        .progress-container { width: 100%; background: #e2e8f0; border-radius: 10px; height: 25px; position: relative; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #10b981; transition: 0.2s; }
        .progress-text { position: absolute; width: 100%; text-align: center; line-height: 25px; font-weight: bold; font-size: 0.85rem; color: #1e293b; }
        .status-msg { margin-top: 10px; text-align: center; font-weight: bold; font-size: 0.9rem; min-height: 1.2em; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>NEHAS SIGNAGE<span class="amharic-sub">ነሃስ ማስታወቂያ</span></h2>
        <ul class="nav-items">
            <li class="active" onclick="location.href='index.html'">Dashboard</li>
            <li onclick="location.href='screens.html'">Screens Manager</li>
            <li onclick="location.href='library.html'">Media Library</li>
        </ul>
    </div>

    <div class="main-content">
        <h1>Dashboard</h1>
        <div class="grid-container">
            <div class="card" style="border-top-color: #10b981;">
                <h3>Add New Screen</h3>
                <div class="form-group">
                    <label>6-Digit Code</label>
                    <input type="text" id="pair-code" placeholder="Check your TV for the code">
                </div>
                <div class="form-group">
                    <label>Screen Name</label>
                    <input type="text" id="pair-name" placeholder="e.g. Reception TV">
                </div>
                <button onclick="pairScreen()">Pair Screen</button>
                <div id="pair-status" class="status-msg"></div>
            </div>

            <div class="card">
                <h3>Upload Media</h3>
                <div class="form-group">
                    <label>Target Screen</label>
                    <select id="screen-select"><option>Loading paired screens...</option></select>
                </div>
                <div class="form-group">
                    <label>File (Image or MP4 Video)</label>
                    <input type="file" id="media-file" accept="image/*,video/mp4">
                    <div id="file-details" class="file-details">
                        <b>Size:</b> <span id="info-size">0.00</span> MB
                    </div>
                </div>
                <div class="form-group">
                    <label>Display Duration (Seconds)</label>
                    <input type="number" id="duration" value="10">
                </div>
                <button onclick="uploadAndDeploy()" id="deploy-btn">Upload & Deploy</button>

                <div class="progress-wrapper" id="progress-wrapper">
                    <div class="progress-container">
                        <div class="progress-bar" id="progress-bar"></div>
                        <div class="progress-text" id="progress-percent">0%</div>
                    </div>
                </div>
                <div id="deploy-status" class="status-msg"></div>
            </div>
        </div>
    </div>

    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const sbClient = window.supabase.createClient(S_URL, S_KEY);

        // --- CLOUDINARY CONFIG ---
        const CLOUD_NAME = 'dfgfiope9';
        const UPLOAD_PRESET = 'nehas_unsigned'; // Ensure this is created in Cloudinary settings
        const CLOUDINARY_URL = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`;

        // Update file size display
        document.getElementById('media-file').onchange = function() {
            const f = this.files[0];
            if(f) {
                document.getElementById('info-size').textContent = (f.size / 1048576).toFixed(2);
                document.getElementById('file-details').style.display = 'block';
            }
        };

        // Load screens with Ghost ID fix
        async function loadScreens() {
            const { data } = await sbClient.from('screens').select('id, name').eq('is_paired', true).order('name');
            const sel = document.getElementById('screen-select');
            
            if (!data || data.length === 0) {
                sel.innerHTML = '<option value="">No screens paired found</option>';
            } else {
                sel.innerHTML = data.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
            }
        }

        async function pairScreen() {
            const c = document.getElementById('pair-code').value;
            const n = document.getElementById('pair-name').value;
            const status = document.getElementById('pair-status');

            const { data } = await sbClient.from('screens').select('id').eq('pairing_code', c).eq('is_paired', false);
            
            if(data?.length) {
                await sbClient.from('screens').update({ name: n, is_paired: true, pairing_code: null }).eq('id', data[0].id);
                status.style.color = "#10b981";
                status.textContent = "Paired successfully!";
                loadScreens();
            } else { 
                status.style.color = "#ef4444";
                status.textContent = "Invalid Code."; 
            }
        }

        async function uploadAndDeploy() {
            const sid = document.getElementById('screen-select').value;
            const file = document.getElementById('media-file').files[0];
            const dur = document.getElementById('duration').value;
            
            if(!sid) { alert("Please pair a screen first."); return; }
            if(!file) { alert("Please select a media file."); return; }

            const btn = document.getElementById('deploy-btn');
            const bar = document.getElementById('progress-bar');
            const txt = document.getElementById('progress-percent');
            const wrap = document.getElementById('progress-wrapper');
            const status = document.getElementById('deploy-status');

            btn.disabled = true; 
            wrap.style.display = 'block';
            status.style.color = "#1e293b";
            status.textContent = "Sending to Cloudinary...";

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);

            try {
                // 1. Upload to Cloudinary with Progress
                const cloudResponse = await new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', CLOUDINARY_URL);

                    xhr.upload.onprogress = (p) => {
                        const pct = Math.round((p.loaded / p.total) * 100);
                        bar.style.width = pct + '%';
                        txt.textContent = pct + '%';
                        status.textContent = `Uploading... ${(p.loaded / 1048576).toFixed(1)}MB`;
                    };

                    xhr.onload = () => resolve(JSON.parse(xhr.responseText));
                    xhr.onerror = () => reject(new Error("Cloudinary Upload Failed"));
                    xhr.send(formData);
                });

                if (cloudResponse.error) throw new Error(cloudResponse.error.message);

                status.textContent = "Almost there... syncing database.";

                // 2. Add to Supabase 'media' table
                const { data: mData, error: mError } = await sbClient.from('media').insert([{ 
                    file_name: file.name, 
                    file_url: cloudResponse.secure_url, 
                    media_type: (cloudResponse.resource_type === 'video' ? 'video' : 'image') 
                }]).select();

                if (mError) throw mError;

                // 3. Add to Playlist loop
                const { data: cPl } = await sbClient.from('playlist_items').select('display_order').eq('screen_id', sid).order('display_order', {ascending:false}).limit(1);
                const ord = (cPl?.[0]?.display_order || 0) + 1;

                await sbClient.from('playlist_items').insert([{ 
                    screen_id: sid, 
                    media_id: mData[0].id, 
                    display_order: ord, 
                    duration_seconds: dur 
                }]);

                status.style.color = "#10b981"; 
                status.textContent = "Success! Display updated.";
                document.getElementById('media-file').value = ""; // Clear input
            } catch (e) { 
                console.error(e);
                status.style.color = "#ef4444";
                status.textContent = "Error: " + e.message; 
            } finally { 
                btn.disabled = false; 
            }
        }

        loadScreens();
    </script>
</body>
</html>
