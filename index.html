<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nehas Admin | Signage Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #3b82f6; --dark: #0f172a; --bg: #f8fafc; --text: #1e293b; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 250px; background: var(--dark); color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar h2 { text-align: center; padding: 25px 0; border-bottom: 1px solid #1e293b; margin: 0; }
        .nav-items { list-style: none; padding: 10px; margin: 0; }
        .nav-items li { padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 14px; margin-bottom: 5px; color: #94a3b8; }
        .nav-items li:hover, .nav-items li.active { background: var(--primary); color: white; font-weight: bold; }
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .view { display: none; }
        .view.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border-top: 5px solid var(--primary); }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #e2e8f0; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { filter: brightness(1.1); }
        .status { margin-top: 10px; text-align: center; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>NEHAS ADMIN</h2>
        <ul class="nav-items">
            <li id="n-dash" class="active" onclick="showView('dash')">Dashboard</li>
            <li id="n-screens" onclick="showView('screens')">Screens</li>
            <li id="n-lib" onclick="showView('lib')">Media Library</li>
        </ul>
    </div>

    <div class="main">
        <div id="v-dash" class="view active">
            <h1>Control Center</h1>
            <div class="grid">
                <div class="card" style="border-top-color: #10b981;">
                    <h3>Link New Display</h3>
                    <input type="text" id="p-code" placeholder="Enter 6-digit code">
                    <input type="text" id="p-name" placeholder="TV Name (e.g. Lobby)">
                    <button onclick="pairTV()" style="background:#10b981">Pair Device</button>
                    <div id="p-status" class="status"></div>
                </div>
                <div class="card" style="border-top-color: #8b5cf6;">
                    <h3>Quick Push URL</h3>
                    <select id="sel-screen" class="s-select"></select>
                    <input type="text" id="q-url" placeholder="YouTube or Website URL">
                    <button onclick="pushUrl()" style="background:#8b5cf6">Deploy URL</button>
                </div>
            </div>
        </div>
        <div id="v-screens" class="view"><div id="screens-grid" class="grid"></div></div>
        <div id="v-lib" class="view"><div id="lib-grid" class="grid"></div></div>
    </div>

    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFį‰°Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const sbClient = supabase.createClient(S_URL, S_KEY);

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-items li').forEach(l => l.classList.remove('active'));
            document.getElementById('v-'+id).classList.add('active');
            document.getElementById('n-'+id).classList.add('active');
            if(id === 'dash' || id === 'screens') loadScreens();
            if(id === 'lib') loadLibrary();
        }

        async function loadScreens() {
            const { data } = await sbClient.from('screens').select('*').eq('is_paired', true);
            const sel = document.getElementById('sel-screen');
            if(sel) sel.innerHTML = data?.map(s => `<option value="${s.id}">${s.name}</option>`).join('') || '<option>No screens paired</option>';
            
            const grid = document.getElementById('screens-grid');
            if(grid) grid.innerHTML = data?.map(s => `<div class="card"><h3>${s.name}</h3><p>Status: Online</p></div>`).join('') || "No active displays.";
        }

        async function pairTV() {
            const code = document.getElementById('p-code').value.trim();
            const name = document.getElementById('p-name').value.trim();
            const status = document.getElementById('p-status');
            if(!code || !name) return alert("Fill all fields");

            status.style.color = "blue"; status.textContent = "Linking...";
            const { data } = await sbClient.from('screens').select('id').eq('pairing_code', code).eq('is_paired', false).maybeSingle();
            
            if (data) {
                await sbClient.from('screens').update({ name: name, is_paired: true, pairing_code: null }).eq('id', data.id);
                status.style.color = "green"; status.textContent = "Success! TV Linked.";
                loadScreens();
            } else {
                status.style.color = "red"; status.textContent = "Invalid or Expired Code.";
            }
        }

        window.onload = loadScreens;
    </script>
</body>
</html>
