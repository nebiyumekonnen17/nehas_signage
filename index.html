<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nehas Signage Management | ነሃስ ማስታወቂያ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #3b82f6; --purple: #8b5cf6; --green: #10b981; --dark: #1e293b; --bg: #f4f6f8; }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); height: 100vh; display: flex; overflow: hidden; }
        .sidebar { width: 250px; background: var(--dark); color: white; flex-shrink: 0; }
        .sidebar h2 { text-align: center; padding: 25px 0; border-bottom: 1px solid #333; margin: 0; }
        .nav-items { list-style: none; padding: 0; }
        .nav-items li { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #333; transition: 0.2s; }
        .nav-items li.active { background: var(--primary); font-weight: bold; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 5px solid var(--primary); }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; font-size: 14px; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .status-msg { margin-top: 10px; text-align: center; font-size: 13px; font-weight: bold; min-height: 1.2em; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>NEHAS SIGNAGE</h2>
        <ul class="nav-items">
            <li id="nav-dash" class="active" onclick="switchView('dash')">Dashboard</li>
            <li id="nav-lib" onclick="switchView('lib')">Library & Screens</li>
        </ul>
    </div>

    <div class="main-content">
        <div id="view-dash" class="view-section active">
            <h1>Control Dashboard</h1>
            <div class="grid">
                <div class="card">
                    <h3>📤 Upload Media</h3>
                    <select class="screen-selector" id="up-sid"></select>
                    <input type="file" id="up-file">
                    <button onclick="uploadMedia()">Upload & Publish</button>
                    <div id="up-status" class="status-msg"></div>
                </div>
                <div class="card" style="border-top-color: var(--purple);">
                    <h3>🧩 Apps / YouTube</h3>
                    <input type="text" id="app-url" placeholder="Paste URL here">
                    <select class="screen-selector" id="app-sid"></select>
                    <button onclick="deployApp()" style="background:var(--purple)">Deploy App</button>
                    <div id="app-status" class="status-msg"></div>
                </div>
                <div class="card" style="border-top-color: var(--green);">
                    <h3>📺 Pair TV</h3>
                    <input type="text" id="p-code" placeholder="6-Digit Code">
                    <input type="text" id="p-name" placeholder="TV Name">
                    <button onclick="pairTV()" style="background:var(--green)">Pair Screen</button>
                </div>
            </div>
        </div>

        <div id="view-lib" class="view-section">
            <h1>Media Library</h1>
            <div id="lib-container" class="grid"></div>
        </div>
    </div>

    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const CLOUD_NAME = 'dfgfiope9';
        const UPLOAD_PRESET = 'nehas_unsigned'; 
        const sbClient = supabase.createClient(S_URL, S_KEY);

        function switchView(name) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-items li').forEach(l => l.classList.remove('active'));
            document.getElementById('view-'+name).classList.add('active');
            document.getElementById('nav-'+name).classList.add('active');
            if(name === 'dash') loadSelectors();
            if(name === 'lib') loadLibrary();
        }

        async function loadSelectors() {
            const { data } = await sbClient.from('screens').select('id, name').eq('is_paired', true);
            document.querySelectorAll('.screen-selector').forEach(sel => {
                sel.innerHTML = data?.map(s => `<option value="${s.id}">${s.name}</option>`).join('') || '<option>No screens paired</option>';
            });
        }

        async function deployApp() {
            const url = document.getElementById('app-url').value;
            const sid = document.getElementById('app-sid').value;
            const status = document.getElementById('app-status');
            
            status.textContent = "Deploying...";
            const { data, error } = await sbClient.from('media').insert([{ file_name: "Web App", file_url: url, media_type: 'url' }]).select();
            if (error) { status.textContent = "Error: " + error.message; return; }
            
            await sbClient.from('playlist_items').insert([{ screen_id: sid, media_id: data[0].id, duration_seconds: 60 }]);
            status.textContent = "✅ Deployed!";
        }

        async function pairTV() {
            const code = document.getElementById('p-code').value;
            const name = document.getElementById('p-name').value;
            const { data } = await sbClient.from('screens').select('id').eq('pairing_code', code).eq('is_paired', false);
            if (data?.length) {
                await sbClient.from('screens').update({ name: name, is_paired: true, pairing_code: null }).eq('id', data[0].id);
                alert("Success!"); loadSelectors();
            }
        }

        window.onload = loadSelectors;
    </script>
</body>
</html>
