<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nehas Signage Admin | ነሃስ ማስታወቂያ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #f4f6f8; height: 100vh; display: flex; }
        .sidebar { width: 250px; background-color: #1e293b; color: white; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; padding: 20px 0; margin: 0; border-bottom: 1px solid #334155; font-size: 1.4rem; }
        .amharic-sub { display: block; font-size: 0.9rem; font-weight: normal; color: #94a3b8; margin-top: 5px; }
        .nav-items { list-style: none; padding: 0; margin: 0; }
        .nav-items li { padding: 15px 20px; border-bottom: 1px solid #334155; cursor: pointer; transition: 0.2s; }
        .nav-items li:hover, .nav-items li.active { background-color: #3b82f6; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1000px; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 4px solid #3b82f6; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #475569; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; }
        .file-details { margin-top: 10px; padding: 10px; background: #f1f5f9; border-radius: 4px; display: none; font-size: 0.85rem; }
        button { background-color: #3b82f6; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        button:disabled { background-color: #94a3b8; }
        .progress-wrapper { margin-top: 20px; display: none; }
        .progress-container { width: 100%; background: #e2e8f0; border-radius: 10px; height: 25px; position: relative; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #10b981; transition: 0.2s; }
        .progress-text { position: absolute; width: 100%; text-align: center; line-height: 25px; font-weight: bold; font-size: 0.85rem; color: #1e293b; }
        .status-msg { margin-top: 10px; text-align: center; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>NEHAS SIGNAGE<span class="amharic-sub">ነሃስ ማስታወቂያ</span></h2>
        <ul class="nav-items">
            <li class="active" onclick="location.href='index.html'">Dashboard</li>
            <li onclick="location.href='screens.html'">Screens Manager</li>
        </ul>
    </div>
    <div class="main-content">
        <h1>Dashboard</h1>
        <div class="grid-container">
            <div class="card" style="border-top-color: #10b981;">
                <h3>Add Screen</h3>
                <div class="form-group"><label>6-Digit Code</label><input type="text" id="pair-code"></div>
                <div class="form-group"><label>Screen Name</label><input type="text" id="pair-name"></div>
                <button onclick="pairScreen()">Pair Screen</button>
                <div id="pair-status" class="status-msg"></div>
            </div>
            <div class="card">
                <h3>Upload Media</h3>
                <div class="form-group">
                    <label>Target Screen</label>
                    <select id="screen-select"><option>Loading...</option></select>
                </div>
                <div class="form-group">
                    <label>File</label>
                    <input type="file" id="media-file" accept="image/*,video/mp4">
                    <div id="file-details" class="file-details">
                        <b>Size:</b> <span id="info-size"></span> MB
                    </div>
                </div>
                <button onclick="uploadAndDeploy()" id="deploy-btn">Upload & Deploy</button>
                <div class="progress-wrapper" id="progress-wrapper">
                    <div class="progress-container">
                        <div class="progress-bar" id="progress-bar"></div>
                        <div class="progress-text" id="progress-percent">0%</div>
                    </div>
                </div>
                <div id="deploy-status" class="status-msg"></div>
            </div>
        </div>
    </div>

    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        
        // sbClient instead of supabase to prevent clash
        const sbClient = window.supabase.createClient(S_URL, S_KEY);

        document.getElementById('media-file').onchange = function() {
            const f = this.files[0];
            if(f) {
                document.getElementById('info-size').textContent = (f.size / 1048576).toFixed(2);
                document.getElementById('file-details').style.display = 'block';
            }
        };

        async function loadScreens() {
            const { data, error } = await sbClient.from('screens').select('id, name').eq('is_paired', true);
            const sel = document.getElementById('screen-select');
            if (error) { console.error(error); return; }
            sel.innerHTML = data?.length ? data.map(s => `<option value="${s.id}">${s.name}</option>`).join('') : '<option>No paired screens</option>';
        }

        async function pairScreen() {
            const c = document.getElementById('pair-code').value;
            const n = document.getElementById('pair-name').value;
            const { data } = await sbClient.from('screens').select('id').eq('pairing_code', c).eq('is_paired', false);
            if(data?.length) {
                await sbClient.from('screens').update({ name: n, is_paired: true, pairing_code: null }).eq('id', data[0].id);
                document.getElementById('pair-status').textContent = "Paired!";
                loadScreens();
            }
        }

        async function uploadAndDeploy() {
            const sid = document.getElementById('screen-select').value;
            const file = document.getElementById('media-file').files[0];
            if(!sid || !file) return;

            const btn = document.getElementById('deploy-btn');
            const bar = document.getElementById('progress-bar');
            const txt = document.getElementById('progress-percent');
            const wrap = document.getElementById('progress-wrapper');
            const status = document.getElementById('deploy-status');

            btn.disabled = true;
            wrap.style.display = 'block';

            const ext = file.name.split('.').pop().toLowerCase();
            const path = `uploads/${Date.now()}.${ext}`;

            try {
                const { error } = await sbClient.storage.from('signage-media').upload(path, file, {
                    onUploadProgress: (p) => {
                        const pct = Math.round((p.loaded / p.total) * 100);
                        bar.style.width = pct + '%';
                        txt.textContent = pct + '%';
                        status.textContent = `Uploading... ${(p.loaded / 1048576).toFixed(1)}MB`;
                    }
                });
                if(error) throw error;

                const { data: urlObj } = sbClient.storage.from('signage-media').getPublicUrl(path);
                const { data: mData } = await sbClient.from('media').insert([{ file_name: file.name, file_url: urlObj.publicUrl, media_type: (ext === 'mp4' ? 'video' : 'image') }]).select();
                
                const { data: cPl } = await sbClient.from('playlist_items').select('display_order').eq('screen_id', sid).order('display_order', {ascending:false}).limit(1);
                const ord = (cPl?.[0]?.display_order || 0) + 1;

                await sbClient.from('playlist_items').insert([{ screen_id: sid, media_id: mData[0].id, display_order: ord, duration_seconds: 10 }]);
                status.textContent = "Success!";
            } catch (e) {
                status.textContent = "Error: " + e.message;
            } finally {
                btn.disabled = false;
            }
        }
        loadScreens();
    </script>
</body>
</html>
