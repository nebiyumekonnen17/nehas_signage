<script>
    const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
    const sbClient = window.supabase.createClient(S_URL, S_KEY);

    // --- CLOUDINARY CONFIG ---
    const CLOUD_NAME = 'dfgfiope9';
    const UPLOAD_PRESET = 'nehas_unsigned'; // Make sure this matches exactly what you named it!
    const CLOUDINARY_URL = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`;

    document.getElementById('media-file').onchange = function() {
        const f = this.files[0];
        if(f) {
            document.getElementById('info-size').textContent = (f.size / 1048576).toFixed(2);
            document.getElementById('file-details').style.display = 'block';
        }
    };

    async function loadScreens() {
        const { data } = await sbClient.from('screens').select('id, name').eq('is_paired', true).order('name');
        const sel = document.getElementById('screen-select');
        sel.innerHTML = data?.length ? data.map(s => `<option value="${s.id}">${s.name}</option>`).join('') : '<option>No paired screens found</option>';
    }

    async function pairScreen() {
        const c = document.getElementById('pair-code').value;
        const n = document.getElementById('pair-name').value;
        const { data } = await sbClient.from('screens').select('id').eq('pairing_code', c).eq('is_paired', false);
        if(data?.length) {
            await sbClient.from('screens').update({ name: n, is_paired: true, pairing_code: null }).eq('id', data[0].id);
            document.getElementById('pair-status').textContent = "Paired!";
            loadScreens();
        } else { document.getElementById('pair-status').textContent = "Invalid Code."; }
    }

    async function uploadAndDeploy() {
        const sid = document.getElementById('screen-select').value;
        const file = document.getElementById('media-file').files[0];
        const dur = document.getElementById('duration').value;
        if(!sid || !file) { alert("Please select a screen and a file."); return; }

        const btn = document.getElementById('deploy-btn');
        const bar = document.getElementById('progress-bar');
        const txt = document.getElementById('progress-percent');
        const wrap = document.getElementById('progress-wrapper');
        const status = document.getElementById('deploy-status');

        btn.disabled = true; 
        wrap.style.display = 'block';
        status.textContent = "Connecting to Cloudinary...";

        // Prepare Cloudinary Upload
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);

        try {
            // 1. Upload to Cloudinary using XHR to track progress
            const cloudResponse = await new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', CLOUDINARY_URL);

                xhr.upload.onprogress = (p) => {
                    const pct = Math.round((p.loaded / p.total) * 100);
                    bar.style.width = pct + '%';
                    txt.textContent = pct + '%';
                    status.textContent = `Uploading to Cloud... ${(p.loaded / 1048576).toFixed(1)}MB`;
                };

                xhr.onload = () => resolve(JSON.parse(xhr.responseText));
                xhr.onerror = () => reject("Upload failed.");
                xhr.send(formData);
            });

            if (cloudResponse.error) throw new Error(cloudResponse.error.message);

            status.textContent = "Updating database...";

            // 2. Insert into Supabase 'media' table
            const { data: mData, error: mError } = await sbClient.from('media').insert([{ 
                file_name: file.name, 
                file_url: cloudResponse.secure_url, 
                media_type: (cloudResponse.resource_type === 'video' ? 'video' : 'image') 
            }]).select();

            if (mError) throw mError;

            // 3. Add to Playlist
            const { data: cPl } = await sbClient.from('playlist_items').select('display_order').eq('screen_id', sid).order('display_order', {ascending:false}).limit(1);
            const ord = (cPl?.[0]?.display_order || 0) + 1;

            await sbClient.from('playlist_items').insert([{ 
                screen_id: sid, 
                media_id: mData[0].id, 
                display_order: ord, 
                duration_seconds: dur 
            }]);

            status.style.color = "#10b981"; 
            status.textContent = "Success! Content is live.";
        } catch (e) { 
            console.error(e);
            status.style.color = "#ef4444";
            status.textContent = "Error: " + e.message; 
        } finally { 
            btn.disabled = false; 
        }
    }

    loadScreens();
</script>
