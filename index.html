<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nehas Admin | Signage Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #3b82f6; --dark: #0f172a; --bg: #f8fafc; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); display: flex; height: 100vh; }
        .sidebar { width: 260px; background: var(--dark); color: white; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; padding: 30px 0; border-bottom: 1px solid #1e293b; margin: 0; letter-spacing: 2px; }
        .nav-items { list-style: none; padding: 20px; margin: 0; }
        .nav-items li { padding: 15px; border-radius: 10px; cursor: pointer; color: #94a3b8; transition: 0.3s; margin-bottom: 10px; }
        .nav-items li:hover, .nav-items li.active { background: var(--primary); color: white; font-weight: bold; }
        .main { flex: 1; padding: 50px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 6px solid var(--primary); }
        h1 { color: var(--dark); margin-bottom: 30px; }
        input, button { width: 100%; padding: 14px; margin-top: 15px; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 16px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; }
        button:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .status-msg { margin-top: 15px; font-weight: 600; text-align: center; min-height: 1.2em; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>NEHAS ADMIN</h2>
        <ul class="nav-items">
            <li class="active">Control Center</li>
        </ul>
    </div>

    <div class="main">
        <h1>Dashboard</h1>
        <div class="grid">
            <div class="card" style="border-top-color: #10b981;">
                <h3 style="margin-top:0;">Link New Display</h3>
                <p style="color:#64748b; font-size: 14px;">Enter the 6-digit code shown on the TV.</p>
                <input type="text" id="p-code" placeholder="000000" maxlength="6" style="text-align:center; font-size: 24px; letter-spacing: 5px; font-family: monospace;">
                <input type="text" id="p-name" placeholder="Display Name (e.g., Main Lobby)">
                <button onclick="pairTV()" style="background:#10b981">Pair Device Now</button>
                <div id="p-status" class="status-msg"></div>
            </div>

            <div class="card" style="border-top-color: #8b5cf6;">
                <h3 style="margin-top:0;">Active Screen</h3>
                <div id="screen-list" style="margin-top:20px;">
                    <p style="color:#94a3b8;">Searching for paired screens...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYመaseIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFተIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const sbClient = supabase.createClient(S_URL, S_KEY);

        async function loadScreens() {
            const { data } = await sbClient.from('screens').select('*').eq('is_paired', true);
            const list = document.getElementById('screen-list');
            if(data && data.length > 0) {
                list.innerHTML = data.map(s => `
                    <div style="padding:15px; background:#f1f5f9; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                        <strong>${s.name}</strong>
                        <span style="color:#10b981; font-size:12px;">● ONLINE</span>
                    </div>
                `).join('');
            } else {
                list.innerHTML = "<p style='color:#94a3b8;'>No screens linked yet.</p>";
            }
        }

        async function pairTV() {
            const code = document.getElementById('p-code').value.trim();
            const name = document.getElementById('p-name').value.trim();
            const status = document.getElementById('p-status');
            
            if(!code || !name) {
                status.style.color = "#ef4444";
                status.textContent = "Please fill in all fields.";
                return;
            }

            status.style.color = "#3b82f6";
            status.textContent = "Checking code...";

            // Find the display in the DB
            const { data, error } = await sbClient
                .from('screens')
                .select('id')
                .eq('pairing_code', code)
                .eq('is_paired', false)
                .maybeSingle();

            if (data) {
                // Update it to "Paired"
                const { error: upError } = await sbClient
                    .from('screens')
                    .update({ 
                        name: name, 
                        is_paired: true, 
                        pairing_code: null 
                    })
                    .eq('id', data.id);

                if(!upError) {
                    status.style.color = "#10b981";
                    status.textContent = "Success! TV is now linked.";
                    document.getElementById('p-code').value = "";
                    document.getElementById('p-name').value = "";
                    loadScreens();
                }
            } else {
                status.style.color = "#ef4444";
                status.textContent = "Invalid Code. Try again.";
            }
        }

        window.onload = loadScreens;
    </script>
</body>
</html>
