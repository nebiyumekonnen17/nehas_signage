<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nehas Admin | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f1f5f9; padding: 50px; }
        .card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); max-width: 450px; margin: auto; }
        input, button { width: 100%; padding: 18px; margin-top: 20px; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 16px; box-sizing: border-box; }
        button { background: #3b82f6; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #2563eb; transform: translateY(-2px); }
        #status { margin-top: 20px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="margin-top:0; color:#1e293b;">Link New Display</h2>
        <p style="color:#64748b;">Enter the 6-digit code shown on your TV.</p>
        <input type="text" id="p-code" placeholder="000000" maxlength="6" style="text-align:center; font-size: 28px; font-family: monospace; letter-spacing: 5px;">
        <input type="text" id="p-name" placeholder="Name (e.g. Office Lobby)">
        <button onclick="pair()">Pair Device Now</button>
        <div id="status"></div>
    </div>

    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFተIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const sbClient = supabase.createClient(S_URL, S_KEY);

        async function pair() {
            const code = document.getElementById('p-code').value.trim();
            const name = document.getElementById('p-name').value.trim();
            const status = document.getElementById('status');

            status.innerText = "Searching for device...";
            
            const { data: screenRecord } = await sbClient.from('screens').select('*').eq('pairing_code', code).eq('is_paired', false).maybeSingle();

            if (screenRecord) {
                const { error } = await sbClient.from('screens').update({ 
                    name: name, is_paired: true, pairing_code: null 
                }).eq('id', screenRecord.id);

                if(!error) {
                    status.style.color = "#10b981";
                    status.innerText = "SUCCESS: TV is now linked!";
                }
            } else {
                status.style.color = "#ef4444";
                status.innerText = "ERROR: Invalid Code or TV is offline.";
            }
        }
    </script>
</body>
</html>
