<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nehas Signage Admin | ነሃስ ማስታወቂያ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary: #3b82f6; 
            --purple: #8b5cf6; 
            --green: #10b981; 
            --dark: #1e293b; 
            --bg: #f4f6f8; 
            --text: #334155; 
        }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); height: 100vh; display: flex; overflow: hidden; color: var(--text); }
        
        /* Sidebar */
        .sidebar { width: 250px; background: var(--dark); color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar h2 { text-align: center; padding: 25px 0; border-bottom: 1px solid #334155; margin: 0; font-size: 1.1rem; }
        .amharic-sub { display: block; font-size: 0.8rem; color: #94a3b8; margin-top: 4px; }
        .nav-items { list-style: none; padding: 0; margin: 0; }
        .nav-items li { padding: 15px 20px; border-bottom: 1px solid #334155; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .nav-items li:hover { background: #334155; }
        .nav-items li.active { background: var(--primary); font-weight: bold; }
        
        /* Main Content */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .view-section { display: none; }
        .view-section.active { display: block; }

        /* Grid & Cards */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 5px solid var(--primary); }
        
        label { display: block; margin-top: 10px; font-weight: 600; font-size: 12px; color: #64748b; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; margin-top: 5px; }
        button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 15px; }
        button:hover { opacity: 0.9; }
        .status-msg { margin-top: 10px; text-align: center; font-size: 13px; font-weight: bold; min-height: 1.2em; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>NEHAS SIGNAGE<span class="amharic-sub">ነሃስ ማስታወቂያ</span></h2>
        <ul class="nav-items">
            <li id="nav-dash" class="active" onclick="switchView('dash')">Dashboard</li>
            <li id="nav-screens" onclick="switchView('screens')">Screens Manager</li>
            <li id="nav-lib" onclick="switchView('lib')">Media Library</li>
        </ul>
    </div>

    <div class="main-content">
        <div id="view-dash" class="view-section active">
            <h1>Control Dashboard</h1>
            <div class="grid-container">
                <div class="card">
                    <h3>📤 Upload Media</h3>
                    <label>Target Screen</label>
                    <select class="screen-selector" id="up-sid"></select>
                    <label>File (Image/Video)</label>
                    <input type="file" id="up-file">
                    <button onclick="uploadMedia()" id="btn-up">Upload & Publish</button>
                    <div id="up-status" class="status-msg"></div>
                </div>

                <div class="card" style="border-top-color: var(--purple);">
                    <h3>🧩 Apps / YouTube</h3>
                    <label>Target Screen</label>
                    <select class="screen-selector" id="app-sid"></select>
                    <label>Paste Link (YouTube/Website)</label>
                    <input type="text" id="app-url" placeholder="https://...">
                    <button onclick="deployApp()" style="background:var(--purple)" id="btn-app">Deploy App</button>
                    <div id="app-status" class="status-msg"></div>
                </div>

                <div class="card" style="border-top-color: var(--green);">
                    <h3>📺 Pair New TV</h3>
                    <label>6-Digit Pairing Code</label>
                    <input type="text" id="pair-code" placeholder="000000">
                    <label>Display Name</label>
                    <input type="text" id="pair-name" placeholder="Front Desk TV">
                    <button onclick="pairScreen()" style="background:var(--green)">Pair Display</button>
                    <div id="pair-status" class="status-msg"></div>
                </div>
            </div>
        </div>

        <div id="view-screens" class="view-section">
            <h1>Screens Manager</h1>
            <div id="screens-container" class="grid-container"></div>
        </div>

        <div id="view-lib" class="view-section">
            <h1>Media Library</h1>
            <div id="lib-container" class="grid-container"></div>
        </div>
    </div>

    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFተIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const CLOUD_NAME = 'dfgfiope9';
        const UPLOAD_PRESET = 'nehas_unsigned'; 
        const sbClient = supabase.createClient(S_URL, S_KEY);

        // --- View Controller ---
        function switchView(name) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-items li').forEach(l => l.classList.remove('active'));
            document.getElementById('view-'+name).classList.add('active');
            document.getElementById('nav-'+name).classList.add('active');
            
            if(name === 'dash') loadSelectors();
            if(name === 'screens') loadScreens();
            if(name === 'lib') loadLibrary();
        }

        async function loadSelectors() {
            const { data } = await sbClient.from('screens').select('id, name').eq('is_paired', true);
            document.querySelectorAll('.screen-selector').forEach(sel => {
                sel.innerHTML = data?.map(s => `<option value="${s.id}">${s.name}</option>`).join('') || '<option value="">No screens paired</option>';
            });
        }

        // --- Deployment Logic ---
        async function deployApp() {
            const url = document.getElementById('app-url').value;
            const sid = document.getElementById('app-sid').value;
            const status = document.getElementById('app-status');
            if(!url || !sid) return alert("Fill all fields");

            status.textContent = "Deploying...";
            const { data, error } = await sbClient.from('media').insert([{ file_name: "App Feed", file_url: url, media_type: 'url' }]).select();
            if(error) return status.textContent = "Error: " + error.message;

            await sbClient.from('playlist_items').insert([{ screen_id: sid, media_id: data[0].id, duration_seconds: 60 }]);
            status.textContent = "✅ Success!";
            document.getElementById('app-url').value = "";
        }

        async function pairScreen() {
            const code = document.getElementById('pair-code').value;
            const name = document.getElementById('pair-name').value;
            const { data } = await sbClient.from('screens').select('id').eq('pairing_code', code).eq('is_paired', false);
            if(data?.length) {
                await sbClient.from('screens').update({ name: name, is_paired: true, pairing_code: null }).eq('id', data[0].id);
                alert("Paired!"); loadSelectors();
            } else { alert("Invalid Code"); }
        }

        // --- Media Library (FIXED) ---
        async function loadLibrary() {
            const cont = document.getElementById('lib-container');
            cont.innerHTML = "Syncing Media...";
            
            const { data: media } = await sbClient.from('media').select('*').order('created_at', {ascending: false});
            const { data: screens } = await sbClient.from('screens').select('id, name').eq('is_paired', true);

            if(!media || media.length === 0) { cont.innerHTML = "Library is empty."; return; }

            cont.innerHTML = media.map(m => {
                const opts = screens?.map(s => `<option value="${s.id}">${s.name}</option>`).join('') || '';
                let icon = m.media_type === 'url' ? '🔗' : '🖼️';
                return `
                    <div class="card">
                        <div style="font-size:30px; text-align:center;">${icon}</div>
                        <b>${m.file_name}</b>
                        <select id="sel-${m.id}">${opts}</select>
                        <button onclick="deployFromLib('${m.id}')">Add to Screen</button>
                        <button onclick="deleteMedia('${m.id}')" style="background:red; font-size:10px; margin-top:5px;">Delete</button>
                    </div>
                `;
            }).join('');
        }

        async function deployFromLib(mid) {
            const sid = document.getElementById('sel-'+mid).value;
            await sbClient.from('playlist_items').insert([{ screen_id: sid, media_id: mid, duration_seconds: 60 }]);
            alert("Added!");
        }

        async function deleteMedia(id) {
            if(!confirm("Delete forever?")) return;
            await sbClient.from('playlist_items').delete().eq('media_id', id);
            await sbClient.from('media').delete().eq('id', id);
            loadLibrary();
        }

        // --- Screens Manager ---
        async function loadScreens() {
            const cont = document.getElementById('screens-container');
            const { data } = await sbClient.from('screens').select('*').eq('is_paired', true);
            cont.innerHTML = data?.map(s => `
                <div class="card" style="border-top-color: ${ (new Date() - new Date(s.last_seen)) / 1000 < 30 ? 'var(--green)' : '#cbd5e1' }">
                    <h3>${s.name}</h3>
                    <p style="font-size:11px;">Status: ${ (new Date() - new Date(s.last_seen)) / 1000 < 30 ? 'Online' : 'Offline' }</p>
                    <button onclick="deleteScreen('${s.id}')" style="background:red">Unpair Screen</button>
                </div>
            `).join('') || "No screens linked.";
        }

        async function deleteScreen(id) {
            if(!confirm("Unpair screen?")) return;
            await sbClient.from('screens').delete().eq('id', id);
            loadScreens();
        }

        window.onload = loadSelectors;
    </script>
</body>
</html>
