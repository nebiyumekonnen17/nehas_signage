<script>
    async function pairTV() {
        const codeInput = document.getElementById('p-code').value.trim();
        const displayName = document.getElementById('p-name').value.trim();
        const statusEl = document.getElementById('p-status');

        if(!codeInput || !displayName) {
            statusEl.innerText = "Error: Fill all fields.";
            return;
        }

        // STEP 1: Query database for the code
        const { data: screenRecord, error } = await sbClient
            .from('screens')
            .select('*')
            .eq('pairing_code', codeInput)
            .eq('is_paired', false)
            .maybeSingle();

        if (screenRecord) {
            // STEP 2: If found, update it to paired
            const { error: upError } = await sbClient
                .from('screens')
                .update({ 
                    name: displayName, 
                    is_paired: true, 
                    pairing_code: null 
                })
                .eq('id', screenRecord.id);

            if(!upError) {
                statusEl.style.color = "#10b981";
                statusEl.innerText = "Success! Display Linked.";
                loadScreens();
            }
        } else {
            statusEl.style.color = "#ef4444";
            statusEl.innerText = "Invalid Code. (Code not found in DB)";
        }
    }
</script>
