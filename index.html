<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nehas Admin | ŠäźŠąÉŠąĶ ŠąõŠąĶŠČ≥ŠčąŠČāŠčę</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #3b82f6; --purple: #8b5cf6; --green: #10b981; --dark: #1e293b; --bg: #f4f6f8; --text: #334155; }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); height: 100vh; display: flex; overflow: hidden; }
        .sidebar { width: 250px; background: var(--dark); color: white; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; padding: 25px 0; border-bottom: 1px solid #334155; margin: 0; font-size: 1.1rem; }
        .nav-items { list-style: none; padding: 0; margin: 0; }
        .nav-items li { padding: 15px 20px; border-bottom: 1px solid #334155; cursor: pointer; font-size: 14px; }
        .nav-items li.active { background: var(--primary); font-weight: bold; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 5px solid var(--primary); }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; margin-top: 5px; }
        button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 15px; }
        .status-msg { margin-top: 10px; text-align: center; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>NEHAS SIGNAGE</h2>
        <ul class="nav-items">
            <li id="nav-dash" class="active" onclick="switchView('dash')">Dashboard</li>
            <li id="nav-screens" onclick="switchView('screens')">Screens</li>
            <li id="nav-lib" onclick="switchView('lib')">Library</li>
        </ul>
    </div>

    <div class="main-content">
        <div id="view-dash" class="view-section active">
            <div class="grid">
                <div class="card" style="border-top-color: var(--green);">
                    <h3>ūüďļ Link New TV</h3>
                    <input type="text" id="pair-code" placeholder="Enter 6-digit code">
                    <input type="text" id="pair-name" placeholder="TV Name (e.g. Lobby)">
                    <button onclick="pairScreen()" style="background:var(--green)">Link Display</button>
                    <div id="pair-status" class="status-msg"></div>
                </div>
                <div class="card" style="border-top-color: var(--purple);">
                    <h3>ūüß© Deploy App</h3>
                    <select class="screen-selector" id="app-sid"></select>
                    <input type="text" id="app-url" placeholder="YouTube or Website URL">
                    <button onclick="deployApp()" style="background:var(--purple)">Deploy</button>
                </div>
            </div>
        </div>
        <div id="view-lib" class="view-section">
            <div id="lib-container" class="grid"></div>
        </div>
        <div id="view-screens" class="view-section">
            <div id="screens-container" class="grid"></div>
        </div>
    </div>

    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFŠČįIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const sbClient = supabase.createClient(S_URL, S_KEY);

        function switchView(name) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-items li').forEach(l => l.classList.remove('active'));
            document.getElementById('view-'+name).classList.add('active');
            document.getElementById('nav-'+name).classList.add('active');
            if(name === 'dash') loadSelectors();
            if(name === 'lib') loadLibrary();
        }

        async function loadSelectors() {
            const { data } = await sbClient.from('screens').select('id, name').eq('is_paired', true);
            document.querySelectorAll('.screen-selector').forEach(sel => {
                sel.innerHTML = data?.map(s => `<option value="${s.id}">${s.name}</option>`).join('') || '<option value="">No screens</option>';
            });
        }

        async function pairScreen() {
            const code = document.getElementById('pair-code').value.trim();
            const name = document.getElementById('pair-name').value.trim();
            const status = document.getElementById('pair-status');
            
            status.style.color = "blue";
            status.textContent = "Connecting to TV...";

            const { data, error } = await sbClient.from('screens').select('id').eq('pairing_code', code).eq('is_paired', false).maybeSingle();
            
            if (data) {
                await sbClient.from('screens').update({ name: name, is_paired: true, pairing_code: null }).eq('id', data.id);
                status.style.color = "green";
                status.textContent = "‚úÖ Paired!";
                loadSelectors();
            } else {
                status.style.color = "red";
                status.textContent = "‚ĚĆ Code not found.";
            }
        }

        window.onload = loadSelectors;
    </script>
</body>
</html>
