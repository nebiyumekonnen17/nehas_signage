<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nehas Signage Admin | ነሃስ ማስታወቂያ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f8; height: 100vh; display: flex; }
        .sidebar { width: 250px; background-color: #1e293b; color: white; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; padding: 20px 0; margin: 0; border-bottom: 1px solid #334155; font-size: 1.4rem; letter-spacing: 1px; }
        .amharic-sub { display: block; font-size: 0.9rem; font-weight: normal; color: #94a3b8; margin-top: 5px; }
        .nav-items { list-style: none; padding: 0; margin: 0; }
        .nav-items li { padding: 15px 20px; border-bottom: 1px solid #334155; cursor: pointer; transition: background 0.2s; }
        .nav-items li:hover, .nav-items li.active { background-color: #3b82f6; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .header { margin-bottom: 30px; }
        .header h1 { margin: 0; color: #0f172a; font-size: 1.8rem; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1000px; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #475569; font-weight: 600; font-size: 0.95rem; }
        input[type="text"], input[type="file"], input[type="number"], select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; background-color: #f8fafc; font-size: 1rem; }
        
        /* File Info Display */
        #file-info { font-size: 0.85rem; color: #64748b; margin-top: 5px; font-weight: bold; display: none; }
        
        button { background-color: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: background 0.2s; width: 100%; margin-top: 10px; }
        button:hover { background-color: #2563eb; }
        button.success-btn { background-color: #10b981; }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; }
        
        /* Progress Bar UI */
        .progress-wrapper { margin-top: 20px; display: none; }
        .progress-container { width: 100%; background-color: #e2e8f0; border-radius: 10px; overflow: hidden; height: 24px; position: relative; }
        .progress-bar { width: 0%; height: 100%; background-color: #10b981; transition: width 0.1s linear; }
        .progress-text { position: absolute; width: 100%; text-align: center; top: 0; left: 0; line-height: 24px; font-size: 0.85rem; font-weight: bold; color: #1e293b; }
        
        .status-msg { margin-top: 10px; font-weight: bold; text-align: center; min-height: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>NEHAS SIGNAGE<span class="amharic-sub">ነሃስ ማስታወቂያ</span></h2>
        <ul class="nav-items">
            <li class="active" onclick="location.href='index.html'">Dashboard</li>
            <li onclick="location.href='screens.html'">Screens Manager</li>
            <li>Media Library</li>
        </ul>
    </div>
    <div class="main-content">
        <div class="header">
            <h1>System Dashboard</h1>
        </div>
        
        <div class="grid-container">
            <div class="card" style="border-top: 4px solid #10b981;">
                <h3 style="margin-top: 0;">Add New Screen</h3>
                <div class="form-group">
                    <label>Pairing Code</label>
                    <input type="text" id="pair-code" placeholder="e.g. 123456" maxlength="6">
                </div>
                <div class="form-group">
                    <label>Screen Name</label>
                    <input type="text" id="pair-name" placeholder="e.g. Front Office TV">
                </div>
                <button class="success-btn" onclick="pairScreen()" id="pair-btn">Pair Screen</button>
                <div id="pair-status" class="status-msg"></div>
            </div>

            <div class="card" style="border-top: 4px solid #3b82f6;">
                <h3 style="margin-top: 0;">Upload Content</h3>
                <div class="form-group">
                    <label>Target Screen</label>
                    <select id="screen-select">
                        <option value="">Loading paired screens...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Select File (Images or MP4)</label>
                    <input type="file" id="media-file" accept="image/png, image/jpeg, image/webp, video/mp4" onchange="updateFileInfo()">
                    <div id="file-info">Selected Size: 0 MB</div>
                </div>
                <div class="form-group">
                    <label>Image Duration (Seconds)</label>
                    <input type="number" id="duration" value="10" min="1">
                </div>
                
                <button onclick="uploadAndDeploy()" id="deploy-btn">Upload & Deploy</button>
                
                <div class="progress-wrapper" id="progress-wrapper">
                    <div class="progress-container">
                        <div class="progress-bar" id="progress-bar"></div>
                        <div class="progress-text" id="progress-percent">0%</div>
                    </div>
                </div>
                <div id="deploy-status" class="status-msg"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const BUCKET_NAME = 'signage-media';

        // Show file size immediately after selecting
        function updateFileInfo() {
            const fileInput = document.getElementById('media-file');
            const fileInfo = document.getElementById('file-info');
            if (fileInput.files.length > 0) {
                const size = (fileInput.files[0].size / (1024 * 1024)).toFixed(2);
                fileInfo.textContent = `Selected Size: ${size} MB`;
                fileInfo.style.display = 'block';
                if (size > 50) fileInfo.style.color = 'red';
                else fileInfo.style.color = '#64748b';
            }
        }

        async function loadScreens() {
            const { data: screens } = await supabaseClient.from('screens').select('id, name').eq('is_paired', true).order('name');
            const select = document.getElementById('screen-select');
            select.innerHTML = screens?.length ? '' : '<option value="">No paired screens found.</option>';
            screens?.forEach(screen => {
                const opt = document.createElement('option');
                opt.value = screen.id; opt.textContent = screen.name;
                select.appendChild(opt);
            });
        }

        async function pairScreen() {
            const code = document.getElementById('pair-code').value.trim();
            const name = document.getElementById('pair-name').value.trim();
            if (!code || !name) return;
            const { data } = await supabaseClient.from('screens').select('id').eq('pairing_code', code).eq('is_paired', false);
            if (data?.length) {
                await supabaseClient.from('screens').update({ name, is_paired: true, pairing_code: null }).eq('id', data[0].id);
                document.getElementById('pair-status').textContent = "Paired!";
                loadScreens();
            }
        }

        async function uploadAndDeploy() {
            const screenId = document.getElementById('screen-select').value;
            const fileInput = document.getElementById('media-file');
            const statusMsg = document.getElementById('deploy-status');
            const progressWrapper = document.getElementById('progress-wrapper');
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-percent');
            const deployBtn = document.getElementById('deploy-btn');

            if (!screenId || !fileInput.files[0]) {
                statusMsg.textContent = "Please select a screen and file.";
                return;
            }

            const file = fileInput.files[0];
            const fileExt = file.name.split('.').pop().toLowerCase();
            const fileName = `${Math.random().toString(36).substring(2, 12)}_${Date.now()}.${fileExt}`;
            const filePath = `uploads/${fileName}`;

            deployBtn.disabled = true;
            progressWrapper.style.display = 'block';
            statusMsg.textContent = "Uploading...";

            try {
                const { data, error } = await supabaseClient.storage.from(BUCKET_NAME).upload(filePath, file, {
                    onUploadProgress: (progress) => {
                        const percent = Math.round((progress.loaded / progress.total) * 100);
                        progressBar.style.width = percent + '%';
                        progressText.textContent = percent + '%';
                    }
                });

                if (error) throw error;

                const { data: urlData } = supabaseClient.storage.from(BUCKET_NAME).getPublicUrl(filePath);
                const { data: mediaData } = await supabaseClient.from('media').insert([{ 
                    file_name: file.name, file_url: urlData.publicUrl, media_type: (fileExt === 'mp4' ? 'video' : 'image') 
                }]).select();

                const { data: currentItems } = await supabaseClient.from('playlist_items').select('display_order').eq('screen_id', screenId).order('display_order', { ascending: false }).limit(1);
                const nextOrder = (currentItems?.length ? currentItems[0].display_order : 0) + 1;

                await supabaseClient.from('playlist_items').insert([{ 
                    screen_id: screenId, media_id: mediaData[0].id, display_order: nextOrder, duration_seconds: document.getElementById('duration').value 
                }]);

                statusMsg.style.color = '#10b981';
                statusMsg.textContent = "Success! Content is live.";
            } catch (err) {
                statusMsg.style.color = '#dc2626';
                statusMsg.textContent = "Upload failed. Check file size.";
            } finally {
                deployBtn.disabled = false;
                setTimeout(() => { progressWrapper.style.display = 'none'; }, 3000);
            }
        }

        loadScreens();
    </script>
</body>
</html>
