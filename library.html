<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Library | ነሃስ ማስታወቂያ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #f4f6f8; height: 100vh; display: flex; }
        .sidebar { width: 250px; background-color: #1e293b; color: white; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; padding: 20px 0; border-bottom: 1px solid #334155; margin: 0; }
        .amharic-sub { display: block; font-size: 0.8rem; color: #94a3b8; margin-top: 4px; font-weight: normal; }
        .nav-items { list-style: none; padding: 0; margin: 0; }
        .nav-items li { padding: 15px 20px; border-bottom: 1px solid #334155; cursor: pointer; transition: 0.2s; }
        .nav-items li:hover { background-color: #334155; }
        .nav-items li.active { background-color: #3b82f6; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .media-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .media-preview { width: 100%; height: 140px; object-fit: cover; background: #000; }
        .video-label { background: #1e293b; color: #3b82f6; height: 140px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; flex-direction: column; text-align: center; }
        .card-body { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .file-name { font-size: 13px; font-weight: bold; margin-bottom: 10px; color: #1e293b; word-break: break-all; }
        select, button, input { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #cbd5e1; margin-bottom: 8px; font-size: 12px; box-sizing: border-box; }
        button { background: #3b82f6; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #2563eb; }
        .del-btn { background: white !important; color: #ef4444 !important; border: 1px solid #fee2e2 !important; margin-top: auto; }
        .system-alert { background: #fee2e2; color: #b91c1c; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #fecaca; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>NEHAS SIGNAGE<span class="amharic-sub">ነሃስ ማስታወቂያ</span></h2>
        <ul class="nav-items">
            <li onclick="location.href='index.html'">Dashboard</li>
            <li onclick="location.href='screens.html'">Screens Manager</li>
            <li class="active" onclick="location.href='library.html'">Media Library</li>
        </ul>
    </div>
    <div class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1>Media Library</h1>
            <button onclick="loadLibrary()" style="width: auto; padding: 10px 20px;">🔄 Refresh Library</button>
        </div>
        <div id="alert-container"></div>
        <div id="library-container" class="library-grid"></div>
    </div>

    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        
        let sbClient;
        let pairedScreens = [];

        window.onload = async function() {
            if (!window.supabase) return;
            sbClient = window.supabase.createClient(S_URL, S_KEY);
            
            // Get screens for dropdowns
            try {
                const { data } = await sbClient.from('screens').select('id, name').eq('is_paired', true);
                pairedScreens = data || [];
            } catch (e) { console.error(e); }
            
            loadLibrary();
        };

        async function loadLibrary() {
            const cont = document.getElementById('library-container');
            const alertCont = document.getElementById('alert-container');
            cont.innerHTML = "Loading...";
            alertCont.innerHTML = "";

            try {
                // Fetch media - removed .order() to avoid crash if created_at is missing
                const { data: media, error } = await sbClient.from('media').select('*');

                if (error) {
                    alertCont.innerHTML = `<div class="system-alert">⚠️ <b>Database Error:</b> ${error.message}</div>`;
                    cont.innerHTML = "";
                    return;
                }

                if (!media || media.length === 0) {
                    cont.innerHTML = "No media found. Upload something from the Dashboard!";
                    return;
                }

                cont.innerHTML = media.map(item => {
                    const options = pairedScreens.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
                    const preview = item.media_type === 'video' 
                        ? `<div class="video-label">🎬<br>VIDEO</div>` 
                        : `<img src="${item.file_url}" class="media-preview" onerror="this.src='https://via.placeholder.com/150?text=Image+Missing'">`;

                    return `
                        <div class="media-card">
                            ${preview}
                            <div class="card-body">
                                <div class="file-name">${item.file_name || 'Untitled'}</div>
                                <select id="sel-${item.id}">${options || '<option value="">No screens</option>'}</select>
                                <input type="number" id="dur-${item.id}" value="10" placeholder="Secs">
                                <button onclick="deploy('${item.id}')">Add to Playlist</button>
                                <button class="del-btn" onclick="del('${item.id}')">Delete Forever</button>
                            </div>
                        </div>`;
                }).join('');
            } catch (e) {
                alertCont.innerHTML = `<div class="system-alert">⚠️ <b>Critical Error:</b> ${e.message}</div>`;
            }
        }

        async function deploy(mId) {
            const sId = document.getElementById(`sel-${mId}`).value;
            const dur = document.getElementById(`dur-${mId}`).value;
            if (!sId) return alert("Select a screen!");

            const { data } = await sbClient.from('playlist_items').select('display_order').eq('screen_id', sId).order('display_order', {ascending: false}).limit(1);
            const ord = (data?.[0]?.display_order || 0) + 1;

            const { error } = await sbClient.from('playlist_items').insert([{ screen_id: sId, media_id: mId, display_order: ord, duration_seconds: dur }]);
            if (error) alert("Error: " + error.message);
            else alert("Added to playlist!");
        }

        async function del(id) {
            if (!confirm("Delete permanently?")) return;
            await sbClient.from('playlist_items').delete().eq('media_id', id);
            await sbClient.from('media').delete().eq('id', id);
            loadLibrary();
        }
    </script>
</body>
</html>
