<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nehas Admin | Library</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #f8fafc; display: flex; height: 100vh; }
        .sidebar { width: 260px; background: #0f172a; color: white; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; padding: 30px 0; border-bottom: 1px solid #1e293b; margin: 0; letter-spacing: 2px; color: #3b82f6; }
        .nav-items { list-style: none; padding: 20px; margin: 0; }
        .nav-items a { text-decoration: none; color: #94a3b8; display: block; padding: 15px; border-radius: 10px; transition: 0.3s; margin-bottom: 10px; }
        .nav-items a:hover, .nav-items a.active { background: #3b82f6; color: white; font-weight: bold; }
        .main { flex: 1; padding: 50px; overflow-y: auto; }
        
        .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .media-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; border: 1px solid #e2e8f0; }
        .media-preview { width: 100%; height: 150px; background: #cbd5e1; object-fit: cover; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #64748b;}
        .media-actions { padding: 15px; }
        .media-actions button { width: 100%; padding: 10px; background: #10b981; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Assignment Modal */
        dialog { border: none; border-radius: 20px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); width: 400px; }
        dialog::backdrop { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px); }
        .screen-checkbox { display: flex; align-items: center; padding: 10px; background: #f1f5f9; border-radius: 8px; margin-bottom: 10px; }
        .screen-checkbox input { margin-right: 15px; width: 20px; height: 20px; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-buttons button { flex: 1; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>NEHAS ADMIN</h2>
        <ul class="nav-items">
            <li><a href="index.html">Dashboard Hub</a></li>
            <li><a href="screens.html">Screen Manager</a></li>
            <li><a href="library.html" class="active">Media Library</a></li>
        </ul>
    </div>

    <div class="main">
        <h1 style="color: #1e293b; margin-top: 0;">Stored Library</h1>
        <div class="media-grid" id="library-grid">
            <p style="color:#94a3b8;">Loading library...</p>
        </div>
    </div>

    <dialog id="assign-modal">
        <h2 style="margin-top:0;">Deploy to Screens</h2>
        <p style="color:#64748b;">Select which TVs should play this media.</p>
        <div id="screen-checkboxes"></div>
        <div class="modal-buttons">
            <button style="background: #e2e8f0; color: #475569;" onclick="closeModal()">Cancel</button>
            <button style="background: #3b82f6; color: white;" onclick="confirmAssignment()">Deploy Now</button>
        </div>
    </dialog>

    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const sbClient = supabase.createClient(S_URL, S_KEY);

        let currentMediaId = null;

        async function loadLibrary() {
            const { data } = await sbClient.from('media').select('*').order('id', { ascending: false });
            const grid = document.getElementById('library-grid');
            
            if(data && data.length > 0) {
                grid.innerHTML = data.map(m => `
                    <div class="media-card">
                        ${m.media_type === 'image' ? `<img src="${m.file_url}" class="media-preview">` : 
                          `<div class="media-preview">${m.media_type.toUpperCase()} LINK</div>`}
                        <div class="media-actions">
                            <button onclick="openModal(${m.id})">Assign to Screens</button>
                        </div>
                    </div>
                `).join('');
            } else {
                grid.innerHTML = "<p>Your library is empty. Add media via the Dashboard Hub.</p>";
            }
        }

        async function openModal(mediaId) {
            currentMediaId = mediaId;
            const { data } = await sbClient.from('screens').select('id, name').eq('is_paired', true);
            const container = document.getElementById('screen-checkboxes');
            
            if(data && data.length > 0) {
                container.innerHTML = data.map(s => `
                    <label class="screen-checkbox">
                        <input type="checkbox" value="${s.id}" class="screen-check">
                        ${s.name}
                    </label>
                `).join('');
            } else {
                container.innerHTML = "<p style='color:red;'>No paired screens available.</p>";
            }
            
            document.getElementById('assign-modal').showModal();
        }

        function closeModal() {
            document.getElementById('assign-modal').close();
            currentMediaId = null;
        }

        async function confirmAssignment() {
            if(!currentMediaId) return;
            const checkboxes = document.querySelectorAll('.screen-check:checked');
            if(checkboxes.length === 0) return alert("Select at least one screen.");

            // Loop through selected screens and push the media
            for (let box of checkboxes) {
                const screenId = box.value;
                await sbClient.from('playlist_items').delete().eq('screen_id', screenId); // Clear old
                await sbClient.from('playlist_items').insert([{ screen_id: screenId, media_id: currentMediaId }]); // Add new
            }

            closeModal();
            alert("Success! Content pushed to selected screens.");
        }

        window.onload = loadLibrary;
    </script>
</body>
</html>
