<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nehas Admin | Library</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #f8fafc; display: flex; height: 100vh; }
        .sidebar { width: 260px; background: #0f172a; color: white; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; padding: 30px 0; border-bottom: 1px solid #1e293b; margin: 0; letter-spacing: 2px; color: #3b82f6; }
        .nav-items { list-style: none; padding: 20px; margin: 0; }
        .nav-items a { text-decoration: none; color: #94a3b8; display: block; padding: 15px; border-radius: 10px; transition: 0.3s; margin-bottom: 10px; }
        .nav-items a:hover, .nav-items a.active { background: #3b82f6; color: white; font-weight: bold; }
        .main { flex: 1; padding: 50px; overflow-y: auto; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 500px; }
        input, select, button { width: 100%; padding: 15px; margin-top: 15px; border-radius: 10px; border: 1px solid #e2e8f0; font-size: 16px; box-sizing: border-box; }
        button { background: #10b981; color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>NEHAS ADMIN</h2>
        <ul class="nav-items">
            <li><a href="index.html">Dashboard Hub</a></li>
            <li><a href="screens.html">Screen Manager</a></li>
            <li><a href="library.html" class="active">Media Library</a></li>
        </ul>
    </div>

    <div class="main">
        <h1 style="color: #1e293b; margin-top: 0;">Media Library</h1>
        <div class="card">
            <h3>Push Content to TV</h3>
            <input type="text" id="m-url" placeholder="File URL (Image or Video)">
            <select id="m-type">
                <option value="image">Image</option>
                <option value="video">Video</option>
            </select>
            <select id="target-screen">
                <option value="">Loading screens...</option>
            </select>
            <button onclick="pushMedia()">Deploy to Screen</button>
            <div id="status" style="margin-top: 15px; text-align: center; font-weight: bold;"></div>
        </div>
    </div>

    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const sbClient = supabase.createClient(S_URL, S_KEY);

        async function loadScreens() {
            const { data } = await sbClient.from('screens').select('id, name').eq('is_paired', true);
            const select = document.getElementById('target-screen');
            if(data && data.length > 0) {
                select.innerHTML = data.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
            } else {
                select.innerHTML = `<option value="">No paired screens available</option>`;
            }
        }

        async function pushMedia() {
            const url = document.getElementById('m-url').value.trim();
            const type = document.getElementById('m-type').value;
            const screenId = document.getElementById('target-screen').value;
            const status = document.getElementById('status');

            if(!url || !screenId) return status.innerText = "Fill all fields and select a screen.";
            
            status.style.color = "#3b82f6";
            status.innerText = "Deploying...";

            // 1. Clear old playlist for this screen (Optional, ensures only 1 item plays for now)
            await sbClient.from('playlist_items').delete().eq('screen_id', screenId);

            // 2. Add media to library
            const { data: mediaData } = await sbClient.from('media').insert([{ file_url: url, media_type: type }]).select();

            if (mediaData && mediaData[0]) {
                // 3. Link media to screen
                await sbClient.from('playlist_items').insert([{ screen_id: screenId, media_id: mediaData[0].id }]);
                status.style.color = "#10b981";
                status.innerText = "Deployed! The TV will reload automatically.";
                document.getElementById('m-url').value = '';
            }
        }

        window.onload = loadScreens;
    </script>
</body>
</html>
