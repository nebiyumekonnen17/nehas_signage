<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nehas Admin | Library</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #f8fafc; display: flex; height: 100vh; }
        .sidebar { width: 260px; background: #0f172a; color: white; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; padding: 30px 0; border-bottom: 1px solid #1e293b; margin: 0; letter-spacing: 2px; color: #3b82f6; }
        .nav-items { list-style: none; padding: 20px; margin: 0; }
        .nav-items a { text-decoration: none; color: #94a3b8; display: block; padding: 15px; border-radius: 10px; transition: 0.3s; margin-bottom: 10px; }
        .nav-items a:hover, .nav-items a.active { background: #3b82f6; color: white; font-weight: bold; }
        .main { flex: 1; padding: 50px; overflow-y: auto; }
        
        .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .media-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; border: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .media-preview-box { width: 100%; height: 160px; background: #cbd5e1; object-fit: cover; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #64748b; border-bottom: 1px solid #e2e8f0; }
        
        .media-info { padding: 15px; padding-bottom: 0; }
        .media-info h4 { margin: 0; color: #1e293b; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .media-info p { margin: 5px 0 0 0; color: #94a3b8; font-size: 12px; text-transform: uppercase; font-weight: bold; }

        .media-actions { padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .media-actions button { width: 100%; padding: 10px; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .media-actions button:hover { filter: brightness(1.1); }
        .btn-preview { background: #3b82f6; }
        .btn-assign { background: #10b981; }
        .btn-delete { background: #ef4444; }

        /* Modals */
        dialog { border: none; border-radius: 20px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
        dialog::backdrop { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(5px); }
        
        /* Assign Modal specific */
        #assign-modal { width: 400px; }
        .screen-checkbox { display: flex; align-items: center; padding: 12px; background: #f1f5f9; border-radius: 8px; margin-bottom: 10px; cursor: pointer; border: 1px solid #e2e8f0; transition: 0.2s; }
        .screen-checkbox:hover { background: #e2e8f0; }
        .screen-checkbox input { margin-right: 15px; width: 20px; height: 20px; cursor: pointer; }
        
        /* Preview Modal specific */
        #preview-modal { width: 800px; max-width: 90vw; text-align: center; background: #0f172a; color: white; padding: 20px; }
        #preview-container { width: 100%; height: 500px; background: #000; border-radius: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        #preview-container img, #preview-container video, #preview-container iframe { width: 100%; height: 100%; object-fit: contain; border: none; }

        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-buttons button { flex: 1; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>NEHAS ADMIN</h2>
        <ul class="nav-items">
            <li><a href="index.html">Dashboard Hub</a></li>
            <li><a href="screens.html">Screen Manager</a></li>
            <li><a href="library.html" class="active">Media Library</a></li>
        </ul>
    </div>

    <div class="main">
        <h1 style="color: #1e293b; margin-top: 0;">Stored Library</h1>
        <div class="media-grid" id="library-grid">
            <p style="color:#94a3b8;">Loading library...</p>
        </div>
    </div>

    <dialog id="preview-modal">
        <h2 style="margin-top:0;">Media Preview</h2>
        <div id="preview-container"></div>
        <div class="modal-buttons">
            <button style="background: #3b82f6; color: white;" onclick="closePreviewModal()">Close Preview</button>
        </div>
    </dialog>

    <dialog id="assign-modal">
        <h2 style="margin-top:0;">Deploy to Screens</h2>
        <p style="color:#64748b;">Select which TVs should play this media.</p>
        <div id="screen-checkboxes">
            <p style="color:#94a3b8;">Loading screens...</p>
        </div>
        <div class="modal-buttons">
            <button style="background: #e2e8f0; color: #475569;" onclick="closeAssignModal()">Cancel</button>
            <button id="btn-confirm" style="background: #10b981; color: white;" onclick="confirmAssignment()">Push to TVs</button>
        </div>
    </dialog>

    <script>
        const S_URL = 'https://ynkrloxlyradjbdqdaam.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlua3Jsb3hseXJhZGpiZHFkYWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjY1OTksImV4cCI6MjA5MzAwMjU5OX0.tKbwqscphp4lJuqtZz3hDRIUtI0ab9ftc6V0DROckPo';
        const sbClient = supabase.createClient(S_URL, S_KEY);

        let currentMediaId = null;

        async function loadLibrary() {
            const { data } = await sbClient.from('media').select('*').order('id', { ascending: false });
            const grid = document.getElementById('library-grid');
            
            if(data && data.length > 0) {
                grid.innerHTML = data.map(m => `
                    <div class="media-card">
                        ${m.media_type === 'image' ? `<img src="${m.file_url}" class="media-preview-box">` : 
                          m.media_type === 'video' ? `<video src="${m.file_url}" class="media-preview-box" muted></video>` : 
                          `<div class="media-preview-box">YOUTUBE VIDEO</div>`}
                        
                        <div class="media-info">
                            <h4 title="${m.file_name || 'Unnamed File'}">${m.file_name || 'Unnamed File'}</h4>
                            <p>${m.media_type}</p>
                        </div>

                        <div class="media-actions">
                            <button class="btn-preview" onclick="openPreview('${m.file_url}', '${m.media_type}')">Preview Media</button>
                            <button class="btn-assign" onclick="openAssignModal(${m.id})">Assign to Screens</button>
                            <button class="btn-delete" onclick="deleteMedia(${m.id})">Delete from Library</button>
                        </div>
                    </div>
                `).join('');
            } else {
                grid.innerHTML = "<p style='color:#64748b;'>Your library is empty. Upload media via the Dashboard Hub.</p>";
            }
        }

        // --- PREVIEW LOGIC ---
        function openPreview(url, type) {
            const container = document.getElementById('preview-container');
            if (type === 'image') {
                container.innerHTML = `<img src="${url}">`;
            } else if (type === 'video') {
                container.innerHTML = `<video src="${url}" controls autoplay></video>`;
            } else if (type === 'url') {
                container.innerHTML = `<iframe src="${url}" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            }
            document.getElementById('preview-modal').showModal();
        }

        function closePreviewModal() {
            document.getElementById('preview-container').innerHTML = '';
            document.getElementById('preview-modal').close();
        }

        // --- ASSIGNMENT LOGIC ---
        async function openAssignModal(mediaId) {
            currentMediaId = mediaId;
            const container = document.getElementById('screen-checkboxes');
            container.innerHTML = "<p>Loading active TVs...</p>";
            document.getElementById('assign-modal').showModal();

            const { data, error } = await sbClient.from('screens').select('id, name').eq('is_paired', true);
            
            if (error) {
                return container.innerHTML = `<p style="color:red;">Database Error: ${error.message}</p>`;
            }

            if(data && data.length > 0) {
                container.innerHTML = data.map(s => `
                    <label class="screen-checkbox">
                        <input type="checkbox" value="${s.id}" class="screen-check">
                        <span style="font-weight:bold; color:#1e293b;">${s.name}</span>
                    </label>
                `).join('');
            } else {
                container.innerHTML = "<p style='color:#ef4444; font-weight:bold;'>No TVs are currently linked.</p>";
            }
        }

        function closeAssignModal() {
            document.getElementById('assign-modal').close();
            currentMediaId = null;
        }

        async function confirmAssignment() {
            if(!currentMediaId) return;
            const checkboxes = document.querySelectorAll('.screen-check:checked');
            if(checkboxes.length === 0) return alert("Please select at least one TV to push to.");

            const confirmBtn = document.getElementById('btn-confirm');
            confirmBtn.innerText = "Deploying...";
            confirmBtn.disabled = true;

            try {
                for (let box of checkboxes) {
                    const screenId = box.value;
                    
                    // 1. Delete old playlist item
                    const { error: delErr } = await sbClient.from('playlist_items').delete().eq('screen_id', screenId);
                    if (delErr) throw new Error("Delete old media failed: " + delErr.message);

                    // 2. Insert new playlist item
                    const { error: insErr } = await sbClient.from('playlist_items').insert([{ screen_id: screenId, media_id: currentMediaId }]); 
                    if (insErr) throw new Error("Insert new media failed: " + insErr.message);
                }

                closeAssignModal();
                alert(`Success! Content pushed to ${checkboxes.length} screen(s).`);

            } catch (err) {
                alert("DATABASE BLOCKED ACTION: \n\n" + err.message);
                console.error(err);
            } finally {
                confirmBtn.innerText = "Push to TVs";
                confirmBtn.disabled = false;
            }
        }

        // --- DELETE LOGIC ---
        async function deleteMedia(id) {
            if(confirm("Permanently delete this media? It will instantly be removed from any TVs currently displaying it.")) {
                try {
                    // 1. Remove from active playlists
                    const { error: pErr } = await sbClient.from('playlist_items').delete().eq('media_id', id);
                    if(pErr) throw new Error("Clear Playlist Failed: " + pErr.message);
                    
                    // 2. Remove from library
                    const { error: mErr } = await sbClient.from('media').delete().eq('id', id);
                    if(mErr) throw new Error("Delete Media Failed: " + mErr.message);
                    
                    loadLibrary(); 
                    alert("Media successfully deleted.");
                } catch (err) {
                    alert("DATABASE BLOCKED ACTION: \n\n" + err.message);
                    console.error(err);
                }
            }
        }

        window.onload = loadLibrary;
    </script>
</body>
</html>
